name: build-turma-image

# Build and push the turma dashboard image to GHCR whenever the
# /turma build context (or this workflow) changes on main.
# Runs on GitHub-hosted `ubuntu-latest` — see the note on the job below.
on:
  push:
    branches: [main]
    paths:
      - "turma/**"
      - ".github/workflows/turma-image.yml"
  workflow_dispatch: {}

concurrency:
  group: turma-image
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/turma

jobs:
  build:
    # Hosted. This job builds an image, but the thing it builds FROM is the
    # `type=gha` cache below, not a warm local docker cache — that cache is
    # GitHub-side and follows the job to a hosted runner unchanged. The image is
    # a small node app, nowhere near a hosted runner's disk. So self-hosting
    # bought this nothing but a slot in the box's 3-job queue.
    #
    # Moving here also deletes three steps that existed ONLY as workarounds for
    # that shared box: a per-job DOCKER_CONFIG (3 runners shared one HOME, so a
    # concurrent job's login-action logout wiped this job's ghcr.io credentials
    # mid-push), a workspace-ownership reset (docker steps left root-owned files
    # on the persistent workspace), and a dangling-image prune (the box's disk
    # was shared and finite). A hosted runner is a fresh VM that is thrown away
    # at job end, so none of them have anything to do. Don't reintroduce them.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      # Versioning: the repo-wide MAJOR.MINOR lives in the root VERSION file and
      # every pipeline appends its Actions run number as the patch, giving one
      # full version per build (VERSION.run_number, e.g. 0.1.42).
      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          BASE="$(tr -d '[:space:]' < VERSION)"
          VERSION="${BASE}.${{ github.run_number }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building turma ${VERSION}"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./turma
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          # Scope the gha cache per image family so the agent/turma pipelines
          # don't evict each other out of the shared 10 GB Actions cache.
          cache-from: type=gha,scope=turma
          cache-to: type=gha,mode=max,scope=turma
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
