name: build-turma-image

# Build and push the turma dashboard image to GHCR whenever the
# /turma build context (or this workflow) changes on main.
# Runs on the home-lab self-hosted runners ([self-hosted, linux]).
on:
  push:
    branches: [main]
    paths:
      - "turma/**"
      - ".github/workflows/turma-image.yml"
  workflow_dispatch: {}

concurrency:
  group: turma-image
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/turma

jobs:
  build:
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Reset workspace ownership
        run: docker run --rm -v "$GITHUB_WORKSPACE":/workspace busybox chown -R "$(id -u):$(id -g)" /workspace 2>/dev/null || true

      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      # Versioning: the repo-wide MAJOR.MINOR lives in the root VERSION file and
      # every pipeline appends its Actions run number as the patch, giving one
      # full version per build (VERSION.run_number, e.g. 0.1.42).
      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          BASE="$(tr -d '[:space:]' < VERSION)"
          VERSION="${BASE}.${{ github.run_number }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building turma ${VERSION}"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./turma
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      # Keep the shared runner's disk at a steady state: sweep dangling layers
      # after every run (success or failure). Pulled base images (node, busybox)
      # stay for other jobs. Deliberately NOT `docker builder prune -a`: a
      # concurrent scan job on the same runner would have its in-flight build
      # aborted ("graceful_stop"); build cache is bounded by buildkit GC + the
      # gha cache, so it isn't the disk leak. Never fails the job.
      - name: Clean up dangling images
        if: always()
        run: |
          docker image prune -f || true
          df -h || true
