name: turma-agent-native

# Package the native (non-Docker) Turma agent as a versioned tarball GitHub
# Release, so a WSL/Linux host can install it and self-update against this
# stream (agent/native/turma-agent-update polls these releases).
#
# Post-merge on push to main, path-filtered to agent/** (same source the Docker
# image build watches). Mirrors android-release.yml / glasses-release.yml.
#
# Runs on GitHub-hosted `ubuntu-latest`.
#
# Pure `tar` — no build toolchain — so it just stages the runtime files and the
# native scripts, tars them, emits a .sha256 sidecar (the updater verifies it),
# and publishes both assets. Self-contained: install.sh's source-probe finds the
# runtime files next to itself in the extracted tarball.
#
# Versioning matches the repo: MAJOR.MINOR from the root VERSION file + this run
# number as the patch. Tag: agent-native-v<VERSION>.<run_number>.
on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - "VERSION"
      - ".github/workflows/turma-agent-native.yml"
  workflow_dispatch: {}

concurrency:
  group: turma-agent-native
  cancel-in-progress: false

permissions:
  contents: write # create releases + upload assets

jobs:
  release:
    name: Package and release the native agent
    # Hosted: this job is `tar` and `sha256sum` over a few dozen KB of scripts.
    # It has no image to build, no cache to keep warm and nothing to reach on the
    # home lab, so self-hosting only ever bought it a place in the box's 3-job
    # queue.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Compute version
        id: ver
        run: |
          BASE="$(tr -d '[:space:]' < "$GITHUB_WORKSPACE/VERSION")"
          VERSION="${BASE}.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=agent-native-v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "asset=turma-agent-native-v${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Stage payload
        id: stage
        run: |
          set -eux
          STAGE="$RUNNER_TEMP/turma-agent-native"
          rm -rf "$STAGE"; mkdir -p "$STAGE/hooks"
          # Native scripts + units + docs (flat, so install.sh's source-probe
          # sees hub-agent.py right next to itself).
          cp agent/native/install.sh \
             agent/native/turma-agent \
             agent/native/turma-agentctl \
             agent/native/turma-agent-update \
             agent/native/turma-agent.service \
             agent/native/turma-agent-update.service \
             agent/native/turma-agent-update.timer \
             agent/native/turma-agent.env \
             agent/native/README.md "$STAGE/"
          # Runtime files copied/referenced from agent/.
          cp agent/hub-agent.py agent/tunnel-agent.js agent/tmux.conf "$STAGE/"
          cp agent/hooks/*.py "$STAGE/hooks/"
          # Stamp the version so the extracted install.sh writes $PREFIX/VERSION.
          echo "${{ steps.ver.outputs.version }}" > "$STAGE/VERSION"
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"

      - name: Tar + checksum
        run: |
          set -eux
          STAGE="${{ steps.stage.outputs.stage }}"
          ASSET="${{ steps.ver.outputs.asset }}"
          tar czf "$GITHUB_WORKSPACE/$ASSET" -C "$STAGE" .
          ( cd "$GITHUB_WORKSPACE" && sha256sum "$ASSET" > "$ASSET.sha256" )

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Turma native agent ${{ steps.ver.outputs.tag }}
          body: |
            Native (non-Docker) Turma agent for WSL/Linux hosts.

            - Version: `${{ steps.ver.outputs.version }}`
            - Commit: ${{ github.sha }}

            Install:
            ```
            tar xzf ${{ steps.ver.outputs.asset }} && cd turma-agent-native* 2>/dev/null || true
            ./install.sh
            ```
            The agent self-updates from this release stream. See README.md in the tarball.
          files: |
            ${{ github.workspace }}/${{ steps.ver.outputs.asset }}
            ${{ github.workspace }}/${{ steps.ver.outputs.asset }}.sha256
          fail_on_unmatched_files: true
