name: scan-turma-agent-image

# On PRs to main that touch the /agent build context, build the image locally
# (no push) and scan it for OS/library CVEs and leaked secrets with Trivy.
# Pre-merge counterpart to build-turma-agent-image.yml, which pushes only on main.
# CLAUDE_CODE_VERSION is left at its Dockerfile default (latest) — the scan
# cares about the assembled image, not the exact pinned tag.
#
# Runs on the home-lab self-hosted runners. Trivy is installed from its release
# tarball (the trivy-action pins an internal setup-trivy step to a mutable tag
# upstream has deleted, and the no-sudo runner install is the sibling repo's
# proven pattern anyway). No SARIF upload: the repo has no GitHub Advanced
# Security, so there is no code-scanning API to publish to — findings print to
# the job log and --exit-code gates the PR.
on:
  pull_request:
    branches: [main]
    paths:
      - "agent/**"
      - ".trivyignore"
      - ".github/workflows/turma-agent-image-scan.yml"

concurrency:
  group: turma-agent-image-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: [self-hosted, linux]
    env:
      # Image name recorded inside the build archive. Now only metadata (the
      # daemon never loads it, and the archive itself is isolated in this job's
      # runner.temp), but kept per-run so a scan's output still names the run it
      # came from.
      SCAN_TAG: local/turma-agent:pr-${{ github.run_id }}
    steps:
      - name: Reset workspace ownership
        run: docker run --rm -v "$GITHUB_WORKSPACE":/workspace busybox chown -R "$(id -u):$(id -g)" /workspace 2>/dev/null || true

      - uses: actions/checkout@v7

      # Headroom guard. The structural fix for this job's disk problem is the
      # build/scan handoff below (one image copy instead of three); this step
      # just clears stale cache so the remaining copies have room.
      #
      # Pruning by AGE is deliberate. The cleanup note below rightly rejects an
      # unfiltered `-a` prune — this repo's two scan jobs share one runner and
      # `-a` yanks cache out from under the other job's in-flight build. An
      # until= filter cannot do that: buildkit ages a cache record from when it
      # was last USED, so a concurrent build's cache is 0 minutes old and no
      # window reaches it.
      #
      # The window was 24h and reclaimed 0B on every observed run — on a runner
      # building this image for several PRs an hour, no record is ever a day
      # idle, so the guard never fired. 3h still cannot touch a live build (they
      # last ~10 min) but does evict the previous hours' PR scans, which is what
      # actually accumulates here.
      - name: Reclaim disk before build
        run: |
          df -h / || true
          docker image prune -f || true
          docker builder prune -f --filter until=3h || true
          df -h / || true

      - uses: docker/setup-buildx-action@v4

      # Build to a docker-archive on disk, NOT into the local docker daemon.
      #
      # `load: true` was costing two extra full copies of this multi-GB image,
      # both of which existed only to hand it from buildx to Trivy:
      #   1. load itself exports an OCI tarball and imports it into containerd's
      #      content store (a scan died in exactly this step: "importing to
      #      docker … no space left on device", with 31G free);
      #   2. `trivy image <tag>` then exports the image straight back OUT of the
      #      daemon to its own tarball before it can read it (another scan died
      #      there: "docker-export-… no space left on device", with 37G free —
      #      the build itself had succeeded).
      # So the image landed on disk ~4x at once: buildkit snapshots + content
      # store + Trivy's re-export + Trivy's uncompressed layer scratch.
      #
      # Writing the archive once and pointing Trivy at it with --input drops
      # both middle copies and deletes the two steps that actually failed. Trivy
      # analyses a docker-archive identically to a daemon image (same layers,
      # same flags), so the gate is unchanged. The daemon never sees the image,
      # which is also why cleanup below is an rm rather than a docker rmi.
      - name: Build agent image (local, no push)
        uses: docker/build-push-action@v7
        with:
          context: ./agent
          push: false
          outputs: type=docker,dest=${{ runner.temp }}/agent-image.tar
          tags: ${{ env.SCAN_TAG }}
          # Scan the `tooling` tier — the image WITHOUT the Android stages (see
          # AGENT_BASE at the top of agent/Dockerfile). Trivy is already told to
          # --skip-dirs opt/gradle, opt/android-sdk and usr/lib/jvm below, which
          # is every path those stages write, so building them here produced
          # 7.7 GB that the scanner then ignored byte for byte. The findings are
          # unchanged — OS packages come from the dpkg record and npm packages
          # from /usr/local/lib/node_modules, both of which live in `tooling` and
          # are scanned exactly as before (verified by scanning both tiers with
          # these exact flags and diffing: same 231 OS packages, same findings).
          #
          # What changes is the disk this job touches: the image it builds,
          # exports to a tar, and hands Trivy drops 12.4 GB -> 4.7 GB uncompressed
          # (62%). That is the figure that matters here — not the ~3.7 -> ~1.4 GB
          # compressed/registry one — because every copy this job lands on the
          # runner is uncompressed: the buildkit snapshot, the exported tar, and
          # Trivy's own per-layer scratch extraction. Several of those coexist,
          # and up to three of these scans share one runner, which is what kept
          # exhausting the disk (see the reclaim step above) and what grew the
          # runner's volume 50 -> 120 -> 250 GB in three weeks.
          build-args: |
            AGENT_BASE=tooling
          # Share the agent image's cache scope with the build workflow so the
          # PR scan and the post-merge build prime each other's layer cache. The
          # `tooling` layers are common to both tiers, so the scan still primes
          # the post-merge build's base — it just no longer primes (or pays for)
          # the Android layers the build alone needs.
          cache-from: type=gha,scope=turma-agent
          cache-to: type=gha,mode=max,scope=turma-agent

      - name: Install Trivy
        run: |
          set -euo pipefail
          VERSION=0.70.0
          mkdir -p "$HOME/.local/bin"
          # Retry the whole download+extract: the release download has been
          # seen arriving truncated with a success status, which curl --retry
          # alone can't catch — only the extract proves the archive is whole.
          for attempt in 1 2 3; do
            curl -fsSL --retry 3 -o /tmp/trivy.tgz \
              "https://github.com/aquasecurity/trivy/releases/download/v${VERSION}/trivy_${VERSION}_Linux-64bit.tar.gz" \
              && tar -xzf /tmp/trivy.tgz -C "$HOME/.local/bin" trivy && break
            echo "trivy download/extract failed (attempt ${attempt})"; sleep 5
          done
          chmod +x "$HOME/.local/bin/trivy"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/trivy" --version

      # ignore-unfixed keeps the gate actionable: only CVEs with an available
      # fix fail the PR. Reviewed, non-actionable base-image CVEs are triaged in
      # .trivyignore; anything else HIGH/CRITICAL fails the job.
      #
      # skip-dirs excludes the bundled Android BUILD toolchain (Gradle, the
      # Kotlin compiler, the Android SDK's cmdline/build-tools, the JDK). Trivy's
      # jar scanner flags every bundled dependency (bcprov, guava, plexus-utils,
      # kotlin-compiler, …), but these are developer tooling the agent invokes to
      # BUILD projects on demand — not a network-facing runtime surface — and the
      # set churns with every toolchain bump, so pinning each CVE in .trivyignore
      # would be an endless chase. The agent's actual runtime (node, the manager,
      # gh, ttyd, docker CLI, PowerShell, OS packages) is still fully scanned.
      #
      # Since the build step above targets the `tooling` tier, opt/gradle and
      # opt/android-sdk no longer EXIST in the scanned image and these two flags
      # are inert — kept deliberately, because they are what makes dropping those
      # stages a no-op for coverage, and because this command must stay correct
      # if anyone repoints the build at a tier that does bundle them. usr/lib/jvm
      # is NOT inert: the JDK is an apt package and still ships in `tooling`, so
      # this flag still does real work skipping its bundled jars — while openjdk's
      # own CVEs keep being reported from the dpkg record, which --skip-dirs
      # doesn't touch. That asymmetry is the whole reason the tiers are safe to
      # split; don't "clean up" these flags without re-reading it.
      #
      # --input: scan the archive the build just wrote (see the build step) so
      # the image is never loaded into, nor exported back out of, the daemon.
      #
      # TMPDIR → runner.temp: Trivy still extracts each uncompressed layer to a
      # scratch file before scanning, and even the `tooling` tier (node/npm/gh/
      # ttyd/docker CLI/PowerShell) can blow out the runner container's small
      # /tmp ("no space left on device"). runner.temp lives on the roomy _work
      # volume and is cleaned per job.
      - name: Trivy image scan
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          set -euo pipefail
          # --timeout well above the 5m default: the agent image is large
          # (node/npm/gh/ttyd/docker CLI + the Android toolchain), and even with
          # the build-toolchain dirs skipped the secret scanner over the
          # remaining layers routinely brushes the default ceiling and dies with
          # "context deadline exceeded" (Trivy itself recommends raising it).
          trivy image --input "${RUNNER_TEMP}/agent-image.tar" \
            --scanners vuln,secret \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --skip-dirs "opt/gradle" \
            --skip-dirs "opt/android-sdk" \
            --skip-dirs "usr/lib/jvm" \
            --cache-dir "${RUNNER_TEMP}/trivy-cache" \
            --timeout 15m \
            --exit-code 1 \
            --no-progress

      # The build archive is multi-GB. runner.temp is cleaned per job, but this
      # runner is shared and the next job's build starts before that helps, so
      # drop it the moment the scan is done rather than holding it to job end.
      # `if: always()` because a FAILING scan must not leak it either.
      #
      # Deliberately NOT `docker builder prune`: this repo's two scan jobs
      # (turma-agent + turma) run concurrently on one runner, and an `-a` cache
      # prune here yanks build cache out from under the other job's in-flight
      # build (buildkit aborts with "graceful_stop"). The age-filtered prune at
      # the top of this job is the safe version of that. Never fails the job.
      - name: Clean up scan image
        if: always()
        run: |
          rm -f "${RUNNER_TEMP}/agent-image.tar" || true
          docker image prune -f || true
          df -h || true
