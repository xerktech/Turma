name: build-turma-agent-image

# Build and push the headless agent image to GHCR whenever the /agent build
# context (or this workflow) changes on main. The image currently bundles
# Claude Code, but the name is agent-generic so it can host other agents later.
# Runs on GitHub-hosted `ubuntu-latest` — see the note on the job below.
#
# Two tags, two tiers (see AGENT_BASE at the top of agent/Dockerfile):
#   :latest    the android-build tier — builds and JVM-unit-tests Android apps,
#              and drives a REMOTE device over `adb connect`. Every push.
#   :emulator  adds the in-container emulator + x86_64 system image (+4.4 GB),
#              for booting an AVD locally. workflow_dispatch only — nothing in
#              DockerOps consumes it today, and spending 4.4 GB of build on every
#              agent/ push to produce a tag no stack pulls buys nothing. It stays
#              dispatch-only on hosted runners for the same reason, and it's the
#              tier the job's disk-reclaim step is sized for.
on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/turma-agent-image.yml"
  workflow_dispatch:
    inputs:
      build_emulator:
        description: "Also build and push :emulator (adds ~4.4 GB: emulator + x86_64 system image)"
        type: boolean
        default: false

concurrency:
  group: turma-agent-image
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/turma-agent

jobs:
  build:
    # Hosted. This is the biggest build in the repo, so the two things that made
    # it look self-hosted-only are worth stating: its layer cache is `type=gha`
    # (below), which is GitHub-side and follows it here rather than living on the
    # box; and its disk is handled by the reclaim step below, which frees more
    # than the box ever had spare. The :emulator tier (6.4 GB, dispatch-only) is
    # the high-water mark and is what that step is sized for.
    #
    # Moving here also deletes the per-job DOCKER_CONFIG and workspace-ownership
    # steps, which existed only because the box ran 3 runners as one user on a
    # persistent workspace. A hosted runner is a fresh VM per job.
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      # ~25 GB of preinstalled toolchains this job never uses, against ~14 GB
      # free — and it builds up to 6.4 GB of image (plus buildkit snapshots and
      # the cache export) entirely inside the Dockerfile. Safe to delete the
      # runner's own Android SDK here precisely because the build is hermetic:
      # the image downloads its own. Never fails the job.
      - name: Free up disk space
        run: |
          df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
                      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL || true
          df -h /

      # Versioning: the repo-wide MAJOR.MINOR lives in the root VERSION file and
      # every pipeline appends its Actions run number as the patch, giving one
      # full version per build (VERSION.run_number, e.g. 0.1.42). Separately —
      # NOT part of the version — the bundled Claude Code release is pinned into
      # the build so its contents can't drift; it's resolved here only to feed
      # the CLAUDE_CODE_VERSION build-arg.
      #
      # `npm view` runs directly: it used to go through a throwaway node:24-alpine
      # container purely because the self-hosted box had no npm on PATH, and a
      # hosted runner ships node + npm.
      - name: Resolve versions
        id: ver
        run: |
          set -euo pipefail
          BASE="$(tr -d '[:space:]' < VERSION)"
          VERSION="${BASE}.${{ github.run_number }}"
          CC_VERSION="$(npm view @anthropic-ai/claude-code version | tr -d '[:space:]')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "cc_version=${CC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building turma-agent ${VERSION} (bundling Claude Code ${CC_VERSION})"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build and push (:latest — android-build tier)
        uses: docker/build-push-action@v7
        with:
          context: ./agent
          push: true
          # Explicit rather than relying on the Dockerfile default, so the tier
          # this tag ships is readable here and not two files away.
          build-args: |
            AGENT_BASE=android-build
            CLAUDE_CODE_VERSION=${{ steps.ver.outputs.cc_version }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          # Scope the gha cache per image family so the agent/turma pipelines
          # don't evict each other out of the shared 10 GB Actions cache.
          cache-from: type=gha,scope=turma-agent
          cache-to: type=gha,mode=max,scope=turma-agent
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      # Opt-in, dispatch-only (see the header). Reuses this job's checkout,
      # login, buildx and resolved versions, and pulls the tooling/android-build
      # layers the step above just cached — so it only builds the emulator layer
      # on top.
      - name: Build and push (:emulator — android tier)
        if: ${{ inputs.build_emulator }}
        uses: docker/build-push-action@v7
        with:
          context: ./agent
          push: true
          build-args: |
            AGENT_BASE=android
            CLAUDE_CODE_VERSION=${{ steps.ver.outputs.cc_version }}
          tags: |
            ${{ env.IMAGE }}:emulator
            ${{ env.IMAGE }}:emulator-${{ steps.ver.outputs.version }}
          # cache-FROM only, deliberately. The emulator layer is 4.4 GB
          # uncompressed; writing it back with mode=max would evict most of the
          # shared 10 GB Actions cache that every other build depends on, to
          # speed up a tag built by hand a few times a year. Reading the
          # turma-agent scope still gives it every layer below the emulator.
          cache-from: type=gha,scope=turma-agent
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      # Report the disk this build used. Nothing to clean up — the VM is thrown
      # away at job end — but this is the repo's biggest image and its headroom
      # is what would bite first, so leave the number in the log. Never fails.
      - name: Report disk use
        if: always()
        run: df -h / || true
