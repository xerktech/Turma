name: build-turma-agent-image

# Build and push the headless agent image to GHCR whenever the /agent build
# context (or this workflow) changes on main. The image currently bundles
# Claude Code, but the name is agent-generic so it can host other agents later.
# Runs on the home-lab self-hosted runners ([self-hosted, linux]).
#
# Two tags, two tiers (see AGENT_BASE at the top of agent/Dockerfile):
#   :latest    the android-build tier — builds and JVM-unit-tests Android apps,
#              and drives a REMOTE device over `adb connect`. Every push.
#   :emulator  adds the in-container emulator + x86_64 system image (+4.4 GB),
#              for booting an AVD locally. workflow_dispatch only — nothing in
#              DockerOps consumes it today, and building 4.4 GB on every agent/
#              push to produce a tag no stack pulls is the kind of thing that
#              fills the shared runner's disk.
on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/turma-agent-image.yml"
  workflow_dispatch:
    inputs:
      build_emulator:
        description: "Also build and push :emulator (adds ~4.4 GB: emulator + x86_64 system image)"
        type: boolean
        default: false

concurrency:
  group: turma-agent-image
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/turma-agent

jobs:
  build:
    # Self-hosted: builds and pushes the agent image. Warm layer cache + disk; the
    # :emulator tier alone is 6.4 GB, well past a hosted runner's ~14 GB free.
    runs-on: [self-hosted, linux]
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - name: Reset workspace ownership
        run: docker run --rm -v "$GITHUB_WORKSPACE":/workspace busybox chown -R "$(id -u):$(id -g)" /workspace 2>/dev/null || true

      - uses: actions/checkout@v7

      # Versioning: the repo-wide MAJOR.MINOR lives in the root VERSION file and
      # every pipeline appends its Actions run number as the patch, giving one
      # full version per build (VERSION.run_number, e.g. 0.1.42). Separately —
      # NOT part of the version — the bundled Claude Code release is pinned into
      # the build so its contents can't drift; it's resolved here only to feed
      # the CLAUDE_CODE_VERSION build-arg (via a throwaway node container, since
      # the self-hosted runner has no npm on PATH).
      - name: Resolve versions
        id: ver
        run: |
          set -euo pipefail
          BASE="$(tr -d '[:space:]' < VERSION)"
          VERSION="${BASE}.${{ github.run_number }}"
          CC_VERSION="$(docker run --rm node:24-alpine npm view @anthropic-ai/claude-code version | tr -d '[:space:]')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "cc_version=${CC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building turma-agent ${VERSION} (bundling Claude Code ${CC_VERSION})"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build and push (:latest — android-build tier)
        uses: docker/build-push-action@v7
        with:
          context: ./agent
          push: true
          # Explicit rather than relying on the Dockerfile default, so the tier
          # this tag ships is readable here and not two files away.
          build-args: |
            AGENT_BASE=android-build
            CLAUDE_CODE_VERSION=${{ steps.ver.outputs.cc_version }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          # Scope the gha cache per image family so the agent/turma pipelines
          # don't evict each other out of the shared 10 GB Actions cache.
          cache-from: type=gha,scope=turma-agent
          cache-to: type=gha,mode=max,scope=turma-agent
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      # Opt-in, dispatch-only (see the header). Reuses this job's checkout,
      # login, buildx and resolved versions, and pulls the tooling/android-build
      # layers the step above just cached — so it only builds the emulator layer
      # on top.
      - name: Build and push (:emulator — android tier)
        if: ${{ inputs.build_emulator }}
        uses: docker/build-push-action@v7
        with:
          context: ./agent
          push: true
          build-args: |
            AGENT_BASE=android
            CLAUDE_CODE_VERSION=${{ steps.ver.outputs.cc_version }}
          tags: |
            ${{ env.IMAGE }}:emulator
            ${{ env.IMAGE }}:emulator-${{ steps.ver.outputs.version }}
          # cache-FROM only, deliberately. The emulator layer is 4.4 GB
          # uncompressed; writing it back with mode=max would evict most of the
          # shared 10 GB Actions cache that every other build depends on, to
          # speed up a tag built by hand a few times a year. Reading the
          # turma-agent scope still gives it every layer below the emulator.
          cache-from: type=gha,scope=turma-agent
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      # Keep the shared runner's disk at a steady state: sweep dangling layers
      # after every run (success or failure). Pulled base images (node, busybox)
      # stay for other jobs. Deliberately NOT `docker builder prune -a`: a
      # concurrent scan job on the same runner would have its in-flight build
      # aborted ("graceful_stop"); build cache is bounded by buildkit GC + the
      # gha cache, so it isn't the disk leak. Never fails the job.
      - name: Clean up dangling images
        if: always()
        run: |
          docker image prune -f || true
          df -h || true
