name: agent-emulator-image

# Builds the OPT-IN :emulator tier of the agent image (the `android` base in
# agent/Dockerfile): the android-build tier + the in-container emulator and an
# x86_64 system image (+4.4 GB). Nothing in DockerOps or CI consumes it, so it
# is NOT a release component and carries no unified version — it's a
# build-it-when-you-need-an-AVD convenience, kept out of release.yml so the
# per-release path never spends 4.4 GB on a tag no stack pulls.
#
# Extracted from the old turma-agent-image.yml when releases were unified; the
# `:latest`/versioned agent image is now built by release.yml.
#
# Hosted, like every workflow here. The :emulator tier is the repo's high-water
# mark for disk (6.4 GB) — hence the reclaim step below, which frees ~25 GB of
# preinstalled toolchains and gives it more headroom than the box ever had. Its
# layer cache is `type=gha`, GitHub-side, so it follows the job.
on:
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: "Extra tag to publish alongside :emulator (optional, e.g. a version)"
        type: string
        default: ""

concurrency:
  group: agent-emulator-image
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/turma-agent

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      # ~25 GB of preinstalled toolchains this job never uses, against ~14 GB
      # free — and this tier builds 6.4 GB of image (plus buildkit snapshots)
      # entirely inside the Dockerfile. Safe to delete the runner's own Android
      # SDK precisely because the build is hermetic: the image downloads its own.
      # Never fails the job.
      - name: Free up disk space
        run: |
          df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
                      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL || true
          df -h /

      # The bundled Claude Code release is pinned into the build (so image
      # contents can't drift); resolved via a throwaway node container since the
      # self-hosted runner has no npm on PATH. Not part of any version.
      - name: Resolve Claude Code version
        id: cc
        run: |
          set -euo pipefail
          CC_VERSION="$(docker run --rm node:24-alpine npm view @anthropic-ai/claude-code version | tr -d '[:space:]')"
          echo "version=${CC_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build and push (:emulator — android tier)
        uses: docker/build-push-action@v7
        with:
          context: ./agent
          push: true
          build-args: |
            AGENT_BASE=android
            CLAUDE_CODE_VERSION=${{ steps.cc.outputs.version }}
          tags: |
            ${{ env.IMAGE }}:emulator
            ${{ env.IMAGE }}:emulator-sha-${{ github.sha }}
            ${{ inputs.tag_suffix != '' && format('{0}:emulator-{1}', env.IMAGE, inputs.tag_suffix) || '' }}
          # cache-FROM only, deliberately. The emulator layer is 4.4 GB
          # uncompressed; writing it back with mode=max would evict most of the
          # shared 10 GB Actions cache that every other build depends on, to speed
          # up a tag built by hand a few times a year. Reading the turma-agent
          # scope still gives it every layer below the emulator.
          cache-from: type=gha,scope=turma-agent
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
