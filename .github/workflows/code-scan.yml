name: code-scan

# Code security + quality gate on PRs to main. Runs four independent checks
# over the sources that go into the two images:
#   - Semgrep  : SAST over the JS/Python code, Dockerfiles, and secret patterns
#   - hadolint : Dockerfile best-practice/quality lint (both Dockerfiles)
#   - ShellCheck: shell correctness for entrypoint.sh
#   - tests    : behavioral unit tests for agent/hub-agent.py (stdlib unittest)
#                and agent-hub/server.js (built-in node:test) — see agent/tests/
#                and agent-hub/tests/
# Findings block the PR. Runs on open AND on later pushes to the PR (default
# pull_request types) so every commit is re-checked.
#
# Runs on the home-lab self-hosted runners ([self-hosted, linux]). Notes that
# shape these jobs (see the sibling SwitchBoard repo, which established the
# pattern): the runner has no passwordless sudo (install CLIs to
# $HOME/.local/bin), cannot auth to ghcr.io (so hadolint's Docker action is
# swapped for the release binary), and has no GitHub Advanced Security (so
# there is no code-scanning API to upload SARIF to — findings live in the job
# log + exit codes). setup-python + pip and Docker actions do work here.
on:
  pull_request:
    branches: [main]
    paths:
      - "agent/**"
      - "agent-hub/**"
      - ".github/workflows/code-scan.yml"

concurrency:
  group: code-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: [self-hosted, linux]
    steps:
      - name: Reset workspace ownership
        run: docker run --rm -v "$GITHUB_WORKSPACE":/workspace busybox chown -R "$(id -u):$(id -g)" /workspace 2>/dev/null || true
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Semgrep
        run: pip install --no-cache-dir semgrep
      # p/default = high-signal security+correctness rules for JS/Python; the
      # extra packs add Dockerfile and hardcoded-secret coverage. --error makes
      # any finding fail the job; findings print to the job log.
      #
      # The excluded rules all flag DELIBERATE, documented design choices in this
      # repo (see CLAUDE.md), not defects — keeping them would make the gate
      # perpetually red for things we've chosen on purpose:
      #   - mutable-action-tag: actions are pinned by version tag, not commit
      #     SHA (this repo's convention across all workflows).
      #   - using-http-server: the hub serves plain HTTP on purpose — TLS is
      #     terminated at the Cloudflare tunnel, behind HTTP Basic auth.
      #   - missing-user-entrypoint: the containers must run as root (full host
      #     access for the RC listener / docker socket).
      #   - dynamic-urllib-use-detected: the URL is HUB_URL from the trusted
      #     compose env, not attacker-controlled input.
      # Everything else stays blocking, so new injection/secret/unsafe-eval
      # style issues still fail the PR.
      - name: Semgrep scan
        run: |
          semgrep scan \
            --config=p/default \
            --config=p/secrets \
            --config=p/dockerfile \
            --exclude-rule yaml.github-actions.security.github-actions-mutable-action-tag.github-actions-mutable-action-tag \
            --exclude-rule problem-based-packs.insecure-transport.js-node.using-http-server.using-http-server \
            --exclude-rule dockerfile.security.missing-user-entrypoint.missing-user-entrypoint \
            --exclude-rule python.lang.security.audit.dynamic-urllib-use-detected.dynamic-urllib-use-detected \
            --error

  hadolint:
    name: Hadolint
    runs-on: [self-hosted, linux]
    steps:
      - name: Reset workspace ownership
        run: docker run --rm -v "$GITHUB_WORKSPACE":/workspace busybox chown -R "$(id -u):$(id -g)" /workspace 2>/dev/null || true
      - uses: actions/checkout@v7
      - name: Install hadolint
        # hadolint-action pulls ghcr.io/hadolint/hadolint, which this
        # self-hosted runner cannot authenticate to; install the release
        # binary instead (no-sudo pattern).
        run: |
          set -euo pipefail
          VERSION=2.14.0
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/hadolint" \
            "https://github.com/hadolint/hadolint/releases/download/v${VERSION}/hadolint-linux-x86_64"
          chmod +x "$HOME/.local/bin/hadolint"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/hadolint" --version
      # Blocks only on error-level issues; warnings (e.g. unpinned apt) are
      # surfaced without failing. Tighten to `warning` to gate harder.
      - name: Run hadolint
        run: hadolint --failure-threshold error agent/Dockerfile agent-hub/Dockerfile

  shellcheck:
    name: ShellCheck
    runs-on: [self-hosted, linux]
    steps:
      - name: Reset workspace ownership
        run: docker run --rm -v "$GITHUB_WORKSPACE":/workspace busybox chown -R "$(id -u):$(id -g)" /workspace 2>/dev/null || true
      - uses: actions/checkout@v7
      # Finds every shell script in the repo and lints per its shebang
      # (entrypoint.sh is #!/bin/sh). Fails the job on any finding. This action
      # runs a downloaded binary (no ghcr.io pull), so it works on the runner.
      - uses: ludeeus/action-shellcheck@2.0.0

  tests:
    name: Unit tests
    runs-on: [self-hosted, linux]
    steps:
      - name: Reset workspace ownership
        run: docker run --rm -v "$GITHUB_WORKSPACE":/workspace busybox chown -R "$(id -u):$(id -g)" /workspace 2>/dev/null || true
      - uses: actions/checkout@v7
      # Same setup-python the Semgrep job already relies on; the tests are
      # stdlib unittest only (no pip installs — mirrors the image's no-pip
      # stance), so this is the whole Python toolchain.
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Python unit tests (agent/hub-agent.py)
        run: python3 -m unittest discover -s agent/tests -p "test_*.py" -v
      # node/npm aren't on the self-hosted runner, so run the Node suite in a
      # throwaway node:24-alpine container (Docker Hub pull — the runner can't
      # auth to ghcr.io), same pattern as the build workflow's version lookup.
      # node:test is built in; the tests have zero npm dependencies.
      - name: Node unit tests (agent-hub/server.js + agent/tunnel-agent.js)
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace -w /workspace node:24-alpine \
            sh -c 'node --test agent-hub/tests/*.test.js agent/tests/*.test.js'
