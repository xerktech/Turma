name: android-ci

# PR gate for the Android client: unit-test the pure core (reveal/transcript/
# sessions/chat-items + serialization) and assemble a debug APK. Runs inside a
# throwaway Docker Hub image that bundles the JDK + Android SDK (the self-hosted
# runners can't pull ghcr.io and have no passwordless sudo), mirroring the
# glasses-ci container pattern. Gradle is downloaded+pinned in-job (the image
# doesn't put `gradle` on PATH), so the build is reproducible regardless of the
# image's Gradle. A credential-less build is expected: no google-services.json
# is present, so the Firebase plugin is skipped (see android/app/build.gradle.kts)
# and push is inert — the app still builds.

on:
  pull_request:
    branches: [main]
    paths:
      - "android/**"
      - "VERSION"
      - "agent/Dockerfile"
      - ".github/workflows/android-ci.yml"

env:
  GRADLE_VERSION: "8.11.1"

jobs:
  build:
    runs-on: [self-hosted, linux]
    container:
      image: mingc/android-build-box:latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Reset workspace ownership
        working-directory: ${{ github.workspace }}
        run: chown -R "$(id -u):$(id -g)" . || true

      - uses: actions/checkout@v7

      # The image bundles the JDK + Android SDK but not a `gradle` on PATH.
      # Download the pinned Gradle and expose it, so the build version is fixed
      # by this file, not by whatever the image ships.
      - name: Install Gradle ${{ env.GRADLE_VERSION }}
        working-directory: ${{ github.workspace }}
        run: |
          set -eux
          curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/gradle.zip
          unzip -q -o /tmp/gradle.zip -d /opt
          echo "/opt/gradle-${GRADLE_VERSION}/bin" >> "$GITHUB_PATH"

      # This job is a poor witness for the agent image, and once hid a total
      # breakage: mingc/android-build-box ships MANY build-tools, so Gradle
      # always finds what it asks for here. The agent image installs exactly one
      # and its SDK is read-only to a session, so a project value that drifts
      # from the image's makes Gradle try to auto-download into it — and every
      # agent build dies ("The SDK directory is not writable") while this job
      # stays green. Assert the pins agree rather than trusting the comments.
      - name: Toolchain pins match the agent image
        working-directory: ${{ github.workspace }}
        run: |
          # These steps run under the container's default `sh` (dash), which has
          # no `set -o pipefail` — keep this dash-compatible, like the Gradle
          # step above. Neither assignment below reads from a pipe.
          set -eu
          gradle_bt="$(grep -oP 'buildToolsVersion\s*=\s*"\K[^"]+' android/app/build.gradle.kts)"
          gradle_sdk="$(grep -oP 'compileSdk\s*=\s*\K[0-9]+' android/app/build.gradle.kts)"
          image_bt="$(grep -oP '^ARG ANDROID_BUILD_TOOLS=\K.*' agent/Dockerfile)"
          image_sdk="$(grep -oP '^ARG ANDROID_PLATFORM=android-\K[0-9]+' agent/Dockerfile)"
          echo "gradle: build-tools=${gradle_bt} compileSdk=${gradle_sdk}"
          echo "image : build-tools=${image_bt} compileSdk=${image_sdk}"
          if [ "$gradle_bt" != "$image_bt" ]; then
            echo "::error::buildToolsVersion ${gradle_bt} != agent/Dockerfile ANDROID_BUILD_TOOLS ${image_bt}"
            exit 1
          fi
          if [ "$gradle_sdk" != "$image_sdk" ]; then
            echo "::error::compileSdk ${gradle_sdk} != agent/Dockerfile ANDROID_PLATFORM android-${image_sdk}"
            exit 1
          fi

      # Install exactly what the project pins, so this job builds against the
      # same versions the agent image has rather than whatever the image ships.
      - name: Ensure SDK packages
        working-directory: ${{ github.workspace }}
        run: |
          # These steps run under the container's default `sh` (dash), which has
          # no `set -o pipefail` — keep this dash-compatible, like the Gradle
          # step above. Neither assignment below reads from a pipe.
          set -eu
          bt="$(grep -oP 'buildToolsVersion\s*=\s*"\K[^"]+' android/app/build.gradle.kts)"
          sdk="$(grep -oP 'compileSdk\s*=\s*\K[0-9]+' android/app/build.gradle.kts)"
          yes | sdkmanager "platform-tools" "platforms;android-${sdk}" "build-tools;${bt}" >/dev/null 2>&1 || true

      - name: Unit tests (pure core)
        run: gradle :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Assemble debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: turma-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
