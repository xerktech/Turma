name: android-ci

# PR gate for the Android client: unit-test the pure core (reveal/transcript/
# sessions/chat-items + serialization) and assemble a debug APK.
#
# Runs on GitHub-hosted `ubuntu-latest`, using the JDK + Android SDK that runner
# image preinstalls. It used to run on the self-hosted box inside the multi-GB
# mingc/android-build-box container, which was the box's own constraints talking:
# those runners can't pull ghcr.io and have no passwordless sudo, so a Docker Hub
# image was how the job got a toolchain. A hosted runner already HAS one, and
# pulling several GB every run to replace it would be strictly worse — so the
# container goes with the box. Gradle is still downloaded+pinned in-job, so the
# build version stays fixed by this file rather than by whatever the runner ships.
#
# The toolchain this pins (JDK 17, compileSdk/build-tools 35) matches what
# android/app/build.gradle.kts declares; keep them in step.
#
# A credential-less build is expected: no google-services.json is present, so the
# Firebase plugin is skipped (see android/app/build.gradle.kts) and push is inert
# — the app still builds.

on:
  pull_request:
    branches: [main]
    paths:
      - "android/**"
      - "VERSION"
      - ".github/workflows/android-ci.yml"

# Was missing entirely, which made this the one workflow where pushing twice to
# a PR left the superseded run alive — and it's the most expensive non-image PR
# job in the repo, so each orphan used to hold one of the box's three runners for
# its full duration. Still wanted on hosted: an orphan now burns billed minutes
# instead of a runner slot.
concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_VERSION: "8.11.1"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v7

      # JDK 17 to match sourceCompatibility/jvmTarget in app/build.gradle.kts.
      # Pinned here rather than taken as whatever the runner defaults to, for the
      # same reason Gradle is pinned below.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Pinned Gradle, so the build version is fixed by this file and not by the
      # runner image. Unpacked into RUNNER_TEMP rather than the container's /opt:
      # the job no longer runs as root, and RUNNER_TEMP is writable and per-job.
      - name: Install Gradle ${{ env.GRADLE_VERSION }}
        working-directory: ${{ github.workspace }}
        run: |
          set -eux
          curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o "${RUNNER_TEMP}/gradle.zip"
          unzip -q -o "${RUNNER_TEMP}/gradle.zip" -d "${RUNNER_TEMP}"
          echo "${RUNNER_TEMP}/gradle-${GRADLE_VERSION}/bin" >> "$GITHUB_PATH"

      # Ensure the compileSdk platform + build-tools this project needs are
      # present (idempotent; the runner image ships them, this guards a drift in
      # what it preinstalls).
      - name: Ensure SDK packages
        run: yes | sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" >/dev/null 2>&1 || true

      - name: Unit tests (pure core)
        run: gradle :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Assemble debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: turma-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
