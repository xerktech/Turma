name: scan-agent-hub-image

# On PRs to main that touch the /agent-hub build context, build the image
# locally (no push) and scan it for OS/library CVEs and leaked secrets with
# Trivy. Pre-merge counterpart to build-agent-hub-image.yml (push only on main).
#
# Runs on the home-lab self-hosted runners; Trivy installed from its release
# tarball, no SARIF upload (no GHAS) — see agent-image-scan.yml for the full
# rationale.
on:
  pull_request:
    branches: [main]
    paths:
      - "agent-hub/**"
      - ".trivyignore"
      - ".github/workflows/agent-hub-image-scan.yml"

concurrency:
  group: agent-hub-image-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: [self-hosted, linux]
    steps:
      - name: Reset workspace ownership
        run: docker run --rm -v "$GITHUB_WORKSPACE":/workspace busybox chown -R "$(id -u):$(id -g)" /workspace 2>/dev/null || true

      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build agent-hub image (local, no push)
        uses: docker/build-push-action@v7
        with:
          context: ./agent-hub
          load: true
          push: false
          tags: local/agent-hub:pr-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: |
          set -euo pipefail
          VERSION=0.70.0
          curl -fsSL -o /tmp/trivy.tgz \
            "https://github.com/aquasecurity/trivy/releases/download/v${VERSION}/trivy_${VERSION}_Linux-64bit.tar.gz"
          mkdir -p "$HOME/.local/bin"
          tar -xzf /tmp/trivy.tgz -C "$HOME/.local/bin" trivy
          chmod +x "$HOME/.local/bin/trivy"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/trivy" --version

      # TMPDIR/--cache-dir → runner.temp so Trivy's uncompressed-layer scratch
      # export lands on the roomy _work volume instead of the runner's small
      # /tmp. See agent-image-scan.yml for the full rationale (that larger image
      # is what actually exhausted /tmp).
      - name: Trivy image scan
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          set -euo pipefail
          trivy image local/agent-hub:pr-scan \
            --scanners vuln,secret \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --cache-dir "${RUNNER_TEMP}/trivy-cache" \
            --exit-code 1 \
            --no-progress
