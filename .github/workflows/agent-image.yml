name: build-agent-image

# Build and push the headless agent image to GHCR whenever the /agent build
# context (or this workflow) changes on main. The image currently bundles
# Claude Code, but the name is agent-generic so it can host other agents later.
# Runs on the home-lab self-hosted runners ([self-hosted, linux]).
on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/agent-image.yml"
  workflow_dispatch: {}

concurrency:
  group: agent-image
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/agent

jobs:
  build:
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Reset workspace ownership
        run: docker run --rm -v "$GITHUB_WORKSPACE":/workspace busybox chown -R "$(id -u):$(id -g)" /workspace 2>/dev/null || true

      - uses: actions/checkout@v7

      # Version iteration: the image's headline content is Claude Code, so the
      # primary version tag IS the bundled Claude Code release (pinned into the
      # build so the tag and contents can't drift). github.run_number gives a
      # monotonic build counter that disambiguates repo-side rebuilds of the
      # same Claude Code version (e.g. an entrypoint/Dockerfile tweak).
      # Resolved via a throwaway node container — the self-hosted runner has no
      # npm on PATH.
      - name: Resolve Claude Code version
        id: ver
        run: |
          set -euo pipefail
          CC_VERSION="$(docker run --rm node:24-alpine npm view @anthropic-ai/claude-code version | tr -d '[:space:]')"
          echo "cc_version=${CC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Pinning Claude Code ${CC_VERSION} (build #${{ github.run_number }})"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./agent
          push: true
          build-args: |
            CLAUDE_CODE_VERSION=${{ steps.ver.outputs.cc_version }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.ver.outputs.cc_version }}
            ${{ env.IMAGE }}:${{ steps.ver.outputs.cc_version }}-${{ github.run_number }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.ver.outputs.cc_version }}-${{ github.run_number }}

      # Keep the shared runner's disk at a steady state: sweep dangling layers
      # and unused build cache after every run (success or failure). Pulled
      # base images (node, busybox) stay for other jobs. Never fails the job.
      - name: Clean up build cache
        if: always()
        run: |
          docker image prune -f || true
          docker builder prune -af || true
          df -h || true
