name: glasses-release

# Build + package the Even Hub (G2 glasses) app and publish it as a GitHub
# Release so the .ehpk is a one-click download.
#
# Runs post-merge on push to main, path-filtered to glasses/** (the CI gate
# in glasses-ci.yml runs pre-merge on PRs; this is the release counterpart,
# mirroring how turma-agent-image.yml / turma-image.yml build on push to main).
#
# Same self-hosted-runner constraints as the rest of the repo: reset the
# root-owned workspace first, and run the whole npm workflow (install/build/
# pack) inside a throwaway node:24-alpine container (Docker Hub pull — the
# runner can't auth to ghcr.io, and npm isn't on the runner itself).
#
# Versioning matches the rest of the repo: the MAJOR.MINOR lives in the root
# VERSION file and this pipeline appends its Actions run number as the patch,
# so the release tag is glasses-v<VERSION>.<run_number> (e.g. glasses-v0.1.42).
on:
  push:
    branches: [main]
    paths:
      - "glasses/**"
      - ".github/workflows/glasses-release.yml"
  workflow_dispatch: {}

concurrency:
  group: glasses-release
  cancel-in-progress: false

permissions:
  contents: write # create releases + upload assets

jobs:
  release:
    name: Build, pack, release
    runs-on: [self-hosted, linux]
    steps:
      - name: Reset workspace ownership
        run: docker run --rm -v "$GITHUB_WORKSPACE":/workspace busybox chown -R "$(id -u):$(id -g)" /workspace 2>/dev/null || true

      - uses: actions/checkout@v7

      # Compose the full build version from the repo VERSION file (MAJOR.MINOR)
      # plus this run number as the patch, and the release tag / asset name from
      # it. Computed before the build so it can be stamped into app.json below.
      - name: Compute version
        id: ver
        run: |
          BASE="$(tr -d '[:space:]' < "$GITHUB_WORKSPACE/VERSION")"
          VERSION="${BASE}.${{ github.run_number }}"
          TAG="glasses-v${VERSION}"
          ASSET="turma-hud-v${VERSION}.ehpk"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      # Stamp the build version into app.json so the packed .ehpk carries it.
      # Even Hub keys sideloaded installs on app.json's "version" field — without
      # this it stays 0.1.0 forever and every new build silently replaces the
      # previous one instead of registering as a new build. (Only app.json is
      # touched: `evenhub pack app.json dist` reads the version from there, and
      # rewriting package.json would desync it from package-lock.json and break
      # `npm ci`.) The pack script writes ../turma-hud.ehpk relative to
      # glasses/, so the artifact lands at the workspace root.
      - name: Stamp version, install, build, pack (glasses/)
        run: |
          docker run --rm -e VERSION="${{ steps.ver.outputs.version }}" \
            -v "$GITHUB_WORKSPACE":/workspace -w /workspace/glasses node:24-alpine \
            sh -c 'node -e "const fs=require(\"fs\");const j=JSON.parse(fs.readFileSync(\"app.json\"));j.version=process.env.VERSION;fs.writeFileSync(\"app.json\",JSON.stringify(j,null,2)+\"\n\")" &&
                   npm ci --no-audit --no-fund && npm run build && npm run pack'

      - name: Name the release asset
        run: cp "$GITHUB_WORKSPACE/turma-hud.ehpk" "$GITHUB_WORKSPACE/${{ steps.ver.outputs.asset }}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Glasses ${{ steps.ver.outputs.tag }}
          body: |
            Even Hub (G2 glasses) app package for Turma.

            - Version: `${{ steps.ver.outputs.version }}`
            - Commit: ${{ github.sha }}

            Download `${{ steps.ver.outputs.asset }}` below and sideload it via the Even Hub app.
          files: ${{ github.workspace }}/${{ steps.ver.outputs.asset }}
          fail_on_unmatched_files: true

      # Keep the shared runner's disk at a steady state; never fail the job.
      - name: Clean up dangling images
        if: always()
        run: |
          docker image prune -f || true
          df -h || true
