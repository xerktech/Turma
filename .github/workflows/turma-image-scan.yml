name: scan-turma-image

# On PRs to main that touch the /turma build context, build the image
# locally (no push) and scan it for OS/library CVEs and leaked secrets with
# Trivy. Pre-merge counterpart to build-turma-image.yml (push only on main).
#
# Runs on GitHub-hosted `ubuntu-latest`; Trivy installed from its release
# tarball, no SARIF upload (no GHAS) — see turma-agent-image-scan.yml for the full
# rationale.
on:
  pull_request:
    branches: [main]
    paths:
      - "turma/**"
      - ".trivyignore"
      - ".github/workflows/turma-image-scan.yml"

concurrency:
  group: turma-image-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    # Hosted. This job builds an image, but off the `type=gha` cache below rather
    # than a warm local one, and the turma image is a small node app — the disk
    # pressure that shaped the agent scan next door was never this job's problem.
    # As a PR gate it's also the job that hurt most in the box's 3-job queue,
    # since it blocks a merge.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Per-run tag. The runner is now a fresh VM per job, so this no longer has
      # to stop concurrent scans from clobbering each other's image — but it
      # still names the run a scan's output came from.
      SCAN_TAG: local/turma:pr-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build turma image (local, no push)
        uses: docker/build-push-action@v7
        with:
          context: ./turma
          load: true
          push: false
          tags: ${{ env.SCAN_TAG }}
          # Share the turma image's cache scope with the build workflow so the
          # PR scan and the post-merge build prime each other's layer cache.
          cache-from: type=gha,scope=turma
          cache-to: type=gha,mode=max,scope=turma

      - name: Install Trivy
        run: |
          set -euo pipefail
          VERSION=0.70.0
          mkdir -p "$HOME/.local/bin"
          # Retry the whole download+extract: the release download has been
          # seen arriving truncated with a success status, which curl --retry
          # alone can't catch — only the extract proves the archive is whole.
          for attempt in 1 2 3; do
            curl -fsSL --retry 3 -o /tmp/trivy.tgz \
              "https://github.com/aquasecurity/trivy/releases/download/v${VERSION}/trivy_${VERSION}_Linux-64bit.tar.gz" \
              && tar -xzf /tmp/trivy.tgz -C "$HOME/.local/bin" trivy && break
            echo "trivy download/extract failed (attempt ${attempt})"; sleep 5
          done
          chmod +x "$HOME/.local/bin/trivy"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/trivy" --version

      # TMPDIR/--cache-dir → runner.temp for Trivy's uncompressed-layer scratch
      # export. On the self-hosted box this kept it off the runner container's
      # small /tmp; on a hosted runner /tmp and runner.temp share the one root
      # volume, so it's now belt-and-braces rather than load-bearing — kept
      # because it costs nothing and keeps this job's flags reading the same as
      # turma-agent-image-scan.yml's, where the scratch size is a real constraint.
      - name: Trivy image scan
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          set -euo pipefail
          trivy image "$SCAN_TAG" \
            --scanners vuln,secret \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --cache-dir "${RUNNER_TEMP}/trivy-cache" \
            --exit-code 1 \
            --no-progress
