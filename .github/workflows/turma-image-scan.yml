name: scan-turma-image

# On PRs to main that touch the /turma build context, build the image
# locally (no push) and scan it for OS/library CVEs and leaked secrets with
# Trivy. Pre-merge counterpart to build-turma-image.yml (push only on main).
#
# Runs on the home-lab self-hosted runners; Trivy installed from its release
# tarball, no SARIF upload (no GHAS) — see turma-agent-image-scan.yml for the full
# rationale.
on:
  pull_request:
    branches: [main]
    paths:
      - "turma/**"
      - ".trivyignore"
      - ".github/workflows/turma-image-scan.yml"

concurrency:
  group: turma-image-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    # Self-hosted: builds a container image to scan it — wants the warm layer cache
    # and the disk headroom a hosted runner's ~14 GB doesn't give.
    runs-on: [self-hosted, linux]
    timeout-minutes: 30
    env:
      # Unique per-run tag: concurrent scans of different PRs on one runner
      # would otherwise overwrite each other's local/turma:pr-scan
      # mid-scan, and it lets cleanup remove exactly this run's image.
      SCAN_TAG: local/turma:pr-${{ github.run_id }}
    steps:
      - name: Reset workspace ownership
        run: docker run --rm -v "$GITHUB_WORKSPACE":/workspace busybox chown -R "$(id -u):$(id -g)" /workspace 2>/dev/null || true

      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build turma image (local, no push)
        uses: docker/build-push-action@v7
        with:
          context: ./turma
          load: true
          push: false
          tags: ${{ env.SCAN_TAG }}
          # Share the turma image's cache scope with the build workflow so the
          # PR scan and the post-merge build prime each other's layer cache.
          cache-from: type=gha,scope=turma
          cache-to: type=gha,mode=max,scope=turma

      - name: Install Trivy
        run: |
          set -euo pipefail
          VERSION=0.70.0
          mkdir -p "$HOME/.local/bin"
          # Retry the whole download+extract: the release download has been
          # seen arriving truncated with a success status, which curl --retry
          # alone can't catch — only the extract proves the archive is whole.
          for attempt in 1 2 3; do
            curl -fsSL --retry 3 -o /tmp/trivy.tgz \
              "https://github.com/aquasecurity/trivy/releases/download/v${VERSION}/trivy_${VERSION}_Linux-64bit.tar.gz" \
              && tar -xzf /tmp/trivy.tgz -C "$HOME/.local/bin" trivy && break
            echo "trivy download/extract failed (attempt ${attempt})"; sleep 5
          done
          chmod +x "$HOME/.local/bin/trivy"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/trivy" --version

      # TMPDIR/--cache-dir → runner.temp so Trivy's uncompressed-layer scratch
      # export lands on the roomy _work volume instead of the runner's small
      # /tmp. See turma-agent-image-scan.yml for the full rationale (that larger image
      # is what actually exhausted /tmp).
      - name: Trivy image scan
        env:
          TMPDIR: ${{ runner.temp }}
        run: |
          set -euo pipefail
          trivy image "$SCAN_TAG" \
            --scanners vuln,secret \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --cache-dir "${RUNNER_TEMP}/trivy-cache" \
            --exit-code 1 \
            --no-progress

      # The loaded image would otherwise pile up dangling in the shared runner's
      # docker daemon run after run until the disk fills (which has taken CI
      # down). Remove only this run's tag plus dangling layers — pulled base
      # images stay for other jobs. Deliberately NOT `docker builder prune`:
      # the turma-agent + turma scan jobs run concurrently on one runner, and an
      # `-a` cache prune here aborts the other job's in-flight build with
      # "graceful_stop". Build cache is bounded by buildkit GC + the gha cache,
      # so it isn't the leak. Never fails the job.
      - name: Clean up scan image
        if: always()
        run: |
          docker rmi -f "$SCAN_TAG" 2>/dev/null || true
          docker image prune -f || true
          df -h || true
