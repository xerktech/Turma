name: glasses-ci

# Typecheck + test + build gate for the glasses client on PRs to main.
# Path-filtered to glasses/** so it only runs when that package changes.
#
# Runs on GitHub-hosted `ubuntu-latest`: this is a plain npm install/typecheck/
# test/build with no docker cache to keep warm and nothing big on disk, so
# self-hosting it only bought it a place in the queue behind the image builds.
# It used to run the whole npm workflow inside a throwaway node:24-alpine
# container purely because the self-hosted box had no npm on PATH — a hosted
# runner has node, so setup-node pins the version directly and the image pull
# and container indirection both go away. That also lets setup-node's built-in
# cache keep ~/.npm warm across runs, which the disposable container could never
# do (it died with the cache inside it).
on:
  pull_request:
    branches: [main]
    paths:
      - "glasses/**"
      - ".github/workflows/glasses-ci.yml"

concurrency:
  group: glasses-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: glasses
    steps:
      - uses: actions/checkout@v7
      # Node 24 to match the image base the glasses client is developed against.
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: glasses/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
