<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · Agent Hub</title>
<style>
  :root {
    --page:        #f9f9f7;
    --surface:     #fcfcfb;
    --ink:         #0b0b0b;
    --ink-2:       #52514e;
    --muted:       #898781;
    --hairline:    #e1e0d9;
    --border:      rgba(11,11,11,0.10);
    --critical:    #d03b3b;
    --accent:      #2a78d6;
    --field:       #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page:      #0d0d0d;
      --surface:   #1a1a19;
      --ink:       #ffffff;
      --ink-2:     #c3c2b7;
      --muted:     #898781;
      --hairline:  #2c2c2a;
      --border:    rgba(255,255,255,0.10);
      --accent:    #3987e5;
      --field:     #111110;
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--page); color: var(--ink);
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%; max-width: 360px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 30px 28px 26px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 12px 34px rgba(0,0,0,0.06);
  }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .brand .mark {
    width: 34px; height: 34px; border-radius: 9px; flex: none;
    display: grid; place-items: center; color: #fff;
    background: linear-gradient(135deg, var(--accent), #6f42c1);
  }
  .brand .mark svg { width: 19px; height: 19px; }
  h1 { font-size: 19px; margin: 0; font-weight: 650; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 13px; margin: 8px 0 22px; }

  form { display: flex; flex-direction: column; gap: 14px; }
  label { display: flex; flex-direction: column; gap: 6px; font-size: 12px; color: var(--ink-2); font-weight: 600; }
  input {
    font: inherit; color: var(--ink); background: var(--field);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; width: 100%;
  }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(42,120,214,0.18); }

  button {
    margin-top: 4px; font: inherit; font-weight: 650; font-size: 14px;
    color: #fff; background: var(--accent); border: 0; border-radius: 8px;
    padding: 11px 12px; cursor: pointer;
  }
  button:hover { filter: brightness(1.06); }
  button:disabled { opacity: 0.6; cursor: default; }

  .error {
    display: none; margin-top: 2px; font-size: 12.5px; color: var(--critical);
    background: rgba(208,59,59,0.10); border: 1px solid rgba(208,59,59,0.28);
    border-radius: 8px; padding: 8px 10px;
  }
  .error.show { display: block; }

  .foot { margin-top: 20px; color: var(--muted); font-size: 11.5px; text-align: center; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <span class="mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </span>
      <h1>Agent Hub</h1>
    </div>
    <p class="sub">Sign in to manage your agent fleet.</p>

    <div class="error" id="error"></div>

    <form id="form" autocomplete="on">
      <label>Username
        <input id="username" name="username" type="text" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" autofocus required>
      </label>
      <label>Password
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </label>
      <button id="submit" type="submit">Sign in</button>
    </form>

    <div class="foot">Single-user access</div>
  </div>

<script>
  const form = document.getElementById("form");
  const errBox = document.getElementById("error");
  const submit = document.getElementById("submit");

  function showError(msg) {
    errBox.textContent = msg;
    errBox.classList.add("show");
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errBox.classList.remove("show");
    submit.disabled = true;
    submit.textContent = "Signing in…";
    try {
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.getElementById("username").value,
          password: document.getElementById("password").value,
        }),
      });
      if (res.ok) {
        // Land wherever the user was headed before the redirect, else the dashboard.
        const next = new URLSearchParams(location.search).get("next");
        location.replace(next && next.startsWith("/") ? next : "/");
        return;
      }
      showError(res.status === 401 ? "Incorrect username or password." : "Sign-in failed. Please try again.");
    } catch {
      showError("Network error. Please try again.");
    }
    submit.disabled = false;
    submit.textContent = "Sign in";
  });
</script>
</body>
</html>
