<title>Turma</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  /* Mirrors the web dashboard's login page (turma/public/login.html):
     same palette, card, and light/dark handling, so the phone side of the
     glasses app looks like the mobile web UI. */
  :root {
    --page:     #f9f9f7;
    --surface:  #fcfcfb;
    --ink:      #0b0b0b;
    --ink-2:    #52514e;
    --muted:    #898781;
    --border:   rgba(11,11,11,0.10);
    --critical: #d03b3b;
    --accent:   #2a78d6;
    --field:    #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page:    #0d0d0d;
      --surface: #1a1a19;
      --ink:     #ffffff;
      --ink-2:   #c3c2b7;
      --muted:   #898781;
      --border:  rgba(255,255,255,0.10);
      --accent:  #3987e5;
      --field:   #111110;
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--page); color: var(--ink);
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%; max-width: 360px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 30px 28px 26px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 12px 34px rgba(0,0,0,0.06);
  }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .brand .mark {
    width: 34px; height: 34px; border-radius: 9px; flex: none;
    display: grid; place-items: center; color: #fff;
    background: linear-gradient(135deg, var(--accent), #6f42c1);
  }
  .brand .mark svg { width: 19px; height: 19px; }
  h1 { font-size: 19px; margin: 0; font-weight: 650; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 13px; margin: 8px 0 22px; }

  form { display: flex; flex-direction: column; gap: 14px; }
  label { display: flex; flex-direction: column; gap: 6px; font-size: 12px; color: var(--ink-2); font-weight: 600; }
  input {
    font: inherit; color: var(--ink); background: var(--field);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; width: 100%;
  }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(42,120,214,0.18); }

  button {
    margin-top: 4px; font: inherit; font-weight: 650; font-size: 14px;
    color: #fff; background: var(--accent); border: 0; border-radius: 8px;
    padding: 11px 12px; cursor: pointer;
  }
  button:hover { filter: brightness(1.06); }
  button:disabled { opacity: 0.6; cursor: default; }

  .error {
    display: none; margin-top: 2px; font-size: 12.5px; color: var(--critical);
    background: rgba(208,59,59,0.10); border: 1px solid rgba(208,59,59,0.28);
    border-radius: 8px; padding: 8px 10px;
  }
  .error.show { display: block; }

  .foot { margin-top: 20px; color: var(--muted); font-size: 11.5px; text-align: center; }

  /* Signed-in view: a slim bar plus the real hub dashboard embedded as a
     full-bleed iframe (bridge/device path), or the green-text glasses mirror
     (DOM dev path). Hidden until the user authenticates. */
  #app[hidden] { display: none; }
  #app {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    background: var(--page);
  }
  .bar {
    flex: none; display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 8px 12px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .bar .who { color: var(--ink-2); font-size: 12.5px; }
  .bar .who b { color: var(--ink); font-weight: 650; }
  .bar button {
    margin: 0; width: auto; color: var(--accent); background: none;
    border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 12px; font-size: 12.5px; font-weight: 600;
  }
  .bar button:hover { filter: none; background: rgba(42,120,214,0.08); }

  /* The embedded dashboard — shown on the device (bridge) path. */
  #dashboard { flex: 1; width: 100%; border: 0; display: none; }
  body.backend-bridge #dashboard { display: block; }

  /* The glasses text mirror — shown on the DOM dev path (npm run dev). */
  #glasses-display {
    display: none; margin: 12px;
    background: #000; color: #7fffb0;
    font-family: "Courier New", monospace; font-size: 14px; line-height: 1.3;
    padding: 12px; white-space: pre; outline: none;
    border-radius: 10px; border: 1px solid var(--border);
  }
  body.backend-dom #glasses-display { display: block; }
</style>

<!-- Login card — matches the web dashboard's login page, plus a hub URL field
     (the hub is self-hosted, so there is no default host to assume). The URL is
     persisted with the credentials, so it is entered once per device and
     prefilled on every later sign-in. -->
<div class="card" id="login">
  <div class="brand">
    <span class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </span>
    <h1>Turma</h1>
  </div>
  <p class="sub">Sign in to manage your agent fleet.</p>

  <div class="error" id="login-error"></div>

  <form id="login-form" autocomplete="on">
    <!-- Deliberately type="text" (not type="url") and not `required`: both hand
         native constraint validation a veto over submit, and it rejects the
         scheme-less "turma.example.com" a phone keyboard invites — so the
         browser would block the form with its own bubble before config.ts's
         `normalizeHubUrl` ever got to add the https:// for you. inputmode="url"
         still gets the URL keyboard. Blank/typo handling is ours, in JS. -->
    <label>Hub URL
      <input id="hub-url" name="url" type="text" inputmode="url" autocomplete="url" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="https://turma.example.com" />
    </label>
    <label>Username
      <input id="hub-user" name="username" type="text" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" autofocus required />
    </label>
    <label>Password
      <input id="hub-password" name="password" type="password" autocomplete="current-password" required />
    </label>
    <button id="login-submit" type="submit">Sign in</button>
  </form>

  <div class="foot">Even Realities G2 · Single-user access</div>
</div>

<!-- Signed-in view, shown after a successful login: the real hub dashboard
     embedded as a full-bleed iframe (device path), or the glasses text mirror
     (DOM dev path). The iframe relies on the hub's SameSite=None; Partitioned
     session cookie set during sign-in. -->
<section id="app" hidden>
  <div class="bar">
    <span class="who">Signed in as <b id="app-user"></b></span>
    <button id="sign-out" type="button">Sign out</button>
  </div>
  <iframe id="dashboard" title="Turma dashboard"></iframe>
  <div id="glasses-display" tabindex="0"></div>
</section>

<script type="module" src="/src/main.ts"></script>
