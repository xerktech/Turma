<title>AgentHub Glasses</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  body {
    margin: 0;
    background: #111;
    color: #ddd;
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 16px;
  }
  #glasses-display {
    background: #000;
    color: #7fffb0;
    font-family: "Courier New", monospace;
    font-size: 14px;
    line-height: 1.3;
    padding: 12px;
    white-space: pre;
    outline: none;
  }
  #settings {
    width: 320px;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 12px;
  }
  #settings h2 {
    font-size: 14px;
    margin: 0 0 8px;
  }
  #settings label {
    display: block;
    font-size: 12px;
    margin-top: 8px;
  }
  #settings input {
    width: 100%;
    box-sizing: border-box;
    padding: 4px;
  }
  #settings button {
    margin-top: 10px;
  }
  #settings-status {
    font-size: 12px;
    margin-top: 8px;
  }
</style>

<div id="glasses-display" tabindex="0"></div>

<!-- Phone-side settings panel (not rendered to the glasses); bound by
     phone-settings.ts. Real deployments may hide this behind a gear icon. -->
<section id="settings">
  <h2>Hub connection</h2>
  <label for="hub-url">Hub URL</label>
  <input id="hub-url" type="text" placeholder="https://agents.example.com" />
  <label for="hub-user">User</label>
  <input id="hub-user" type="text" autocomplete="username" />
  <label for="hub-password">Password</label>
  <input id="hub-password" type="password" autocomplete="current-password" />
  <button id="settings-save" type="button">Save</button>
  <button id="settings-test" type="button">Test connection</button>
  <div id="settings-status"></div>
</section>

<script type="module" src="/src/main.ts"></script>
