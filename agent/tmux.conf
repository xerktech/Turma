# tmux config for the agent containers. The Claude/agent TUI runs inside this
# tmux session and is served to the Turma's web terminal over ttyd, so tmux
# sits between the app and the browser and must not flatten what the app draws.
#
# default-terminal advertises 256-color + italics to the app; the RGB override
# then declares that the OUTER terminal (xterm.js in the browser) is truecolor,
# so tmux passes the app's 24-bit colors straight through instead of quantizing
# them. Requires the tmux-256color terminfo entry (ncurses-term, installed in
# the Dockerfile).
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# Let the app emit raw passthrough escape sequences (progress/animation control,
# OSC, etc.) without tmux swallowing them.
set -g allow-passthrough on

# Copying OUT of the web terminal. A copy made inside this tmux — the app's own,
# or tmux copy-mode's — only reaches the viewer's system clipboard as an OSC 52
# escape, and tmux emits one only when the OUTER terminal's terminfo advertises
# the Ms ("set clipboard") capability. Neither xterm-256color nor tmux-256color
# carries an Ms here, so tmux dropped every copy on the floor instead of sending
# it, leaving text pasteable inside the session and nowhere else (XERK-7).
# Declaring Ms is safe for the same reason the RGB override above is: we launch
# the outer terminal, so we know it's xterm.js, and we know what it can do.
set -ga terminal-overrides ",*:Ms=\\E]52;%p1%s;%p2%s\\007"

# `external` (the default) forwards NO application OSC 52 at all — it ignores
# the app's copy rather than passing it out, so the Claude TUI's own copy died
# here. `on` forwards it and keeps a tmux buffer besides, so one copy pastes
# both inside tmux and outside the browser. Both need the Ms above to go
# anywhere, and xterm.js needs a handler to receive it (the hub injects one:
# see TERM_OSC52_JS in turma/server.js).
set -g set-clipboard on

# Snappier redraws for the spinner/animation frames and no meta-key lag.
set -sg escape-time 0
set -g focus-events on
set -g history-limit 20000
