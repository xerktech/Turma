# tmux config for the agent containers. The Claude/agent TUI runs inside this
# tmux session and is served to the Turma's web terminal over ttyd, so tmux
# sits between the app and the browser and must not flatten what the app draws.
#
# default-terminal advertises 256-color + italics to the app; the RGB override
# then declares that the OUTER terminal (xterm.js in the browser) is truecolor,
# so tmux passes the app's 24-bit colors straight through instead of quantizing
# them. Requires the tmux-256color terminfo entry (ncurses-term, installed in
# the Dockerfile).
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# Let the app emit raw passthrough escape sequences (progress/animation control,
# OSC, etc.) without tmux swallowing them.
set -g allow-passthrough on

# Snappier redraws for the spinner/animation frames and no meta-key lag.
set -sg escape-time 0
set -g focus-events on
set -g history-limit 20000
