<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Turma — Usage</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#f9f9f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)">
<link rel="stylesheet" href="/app.css">
<style>
  /* usage-specific layout (chart + legend + table + model breakdown). Tokens,
     base, nav, footer, status live in /app.css; the categorical --s1..--s8
     chart slots too. */
  .chart-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 14px 16px 10px; position: relative;
  }
  /* View switch: By repo (fleet-wide, unified across hosts) vs By host. */
  .viewbar { display: flex; gap: 6px; margin: 2px 0 12px; }
  .viewbar button {
    font: inherit; font-size: 12.5px; padding: 5px 12px; cursor: pointer;
    color: var(--ink-2); background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
  }
  .viewbar button:hover { color: var(--ink); }
  .viewbar button.active { color: var(--accent); border-color: var(--accent); font-weight: 600; }

  /* Legend doubles as the series filter: grouped, every item a toggle. */
  .legend { display: flex; flex-wrap: wrap; gap: 8px 26px; margin-bottom: 12px; }
  .lg-device { display: flex; align-items: center; gap: 4px 12px; flex-wrap: wrap; }
  .lg-device .dev {
    color: var(--ink); font-weight: 600; font-size: 12.5px;
    cursor: pointer; user-select: none; padding: 3px 2px; border-radius: 5px;
  }
  .lg-device .dev:hover { color: var(--accent); }
  .legend .item {
    display: inline-flex; align-items: center; gap: 7px; font-size: 12px; color: var(--ink-2);
    cursor: pointer; user-select: none; padding: 3px 6px; border-radius: 6px;
  }
  .legend .item:hover { background: var(--page); }
  .legend .swatch { width: 12px; height: 12px; border-radius: 3px; flex: none; }
  .legend .item.off { opacity: 0.4; }
  .legend .item.off .swatch { background: transparent !important; box-shadow: inset 0 0 0 1.5px var(--muted); }
  .legend .item.off .name { text-decoration: line-through; }

  /* Composite encoding for series 9+. Only ~8 hues stay separable (and stay
     separable under colorblindness), so a 9th series reuses a hue and takes a
     texture instead of inventing a colour that reads as one of the first eight.
     These mirror the SVG <pattern> defs in texturePaint() — keep them in step. */
  .swatch.tx-stripe { background-image: repeating-linear-gradient(45deg, transparent 0 2px, var(--surface) 2px 4px); }
  .swatch.tx-dot    { background-image: radial-gradient(var(--surface) 1.1px, transparent 1.2px); background-size: 5px 5px; }
  .swatch.tx-cross  { background-image: repeating-linear-gradient(45deg, transparent 0 2px, var(--surface) 2px 3.5px),
                                        repeating-linear-gradient(-45deg, transparent 0 2px, var(--surface) 2px 3.5px); }

  svg { display: block; width: 100%; }
  svg text { font: 11px var(--font-sans); fill: var(--muted); font-variant-numeric: tabular-nums; }
  .gridline { stroke: var(--hairline); stroke-width: 1; }
  .baseline { stroke: var(--hairline); stroke-width: 1; }
  .day-hit { fill: transparent; cursor: default; outline: none; }
  .day-band.hover .seg { filter: brightness(1.09); }

  .tooltip {
    position: absolute; pointer-events: none; z-index: 5; display: none;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
    box-shadow: var(--shadow-md);
    padding: 8px 12px; font-size: 12px; min-width: 210px;
  }
  .tooltip .tt-date { color: var(--muted); margin-bottom: 5px; }
  .tooltip .tt-row { display: flex; align-items: center; gap: 8px; padding: 1.5px 0; }
  /* Square rather than a hairline dash: two series can share a hue (see the
     .tx-* textures), so the key has to be big enough to show which texture. */
  .tooltip .tt-key { width: 9px; height: 9px; border-radius: 2px; flex: none; }
  .tooltip .tt-val { font-weight: 600; font-variant-numeric: tabular-nums; color: var(--ink); }
  .tooltip .tt-name { color: var(--ink-2); flex: 1; }
  .tooltip .tt-dev { color: var(--muted); }
  .tooltip .tt-total { border-top: 1px solid var(--hairline); margin-top: 5px; padding-top: 5px; }

  details.table-view { margin-top: 12px; }
  details.table-view summary { color: var(--muted); font-size: 12px; cursor: pointer; user-select: none; }
  details.table-view summary:hover { color: var(--ink-2); }
  .table-scroll {
    overflow-x: auto; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius-md); margin-top: 8px;
  }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { padding: 8px 14px; text-align: right; white-space: nowrap; }
  th:first-child, td:first-child { text-align: left; position: sticky; left: 0; background: var(--surface); }
  thead th { color: var(--ink-2); font-weight: 600; font-size: 12px; border-bottom: 1px solid var(--hairline); }
  thead th .sub { display: block; color: var(--muted); font-weight: 400; font-size: 11px; }
  tbody td { border-bottom: 1px solid var(--hairline); font-variant-numeric: tabular-nums; }
  tbody tr:last-child td { border-bottom: none; }
  td .tok { font-weight: 600; }
  td .sub-tok { color: var(--muted); font-size: 11px; display: block; }
  td.zero { color: var(--muted); }
  .total-col { border-left: 1px solid var(--hairline); }
  tfoot td { border-top: 1px solid var(--hairline); font-weight: 600; font-variant-numeric: tabular-nums; }
  tfoot .label { color: var(--ink-2); font-weight: 600; }

  /* "Tokens by model" — the flat answer to which model consumed what. Scoped to
     the same visible series as the chart above it. */
  .models-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 14px 16px; margin-top: 16px;
  }
  .models-card h2 { font-size: 13px; font-weight: 600; color: var(--ink-2); margin: 0 0 10px; }
  .models-card table { font-size: 13px; }
  .models-card td:first-child { font-family: var(--font-mono); font-size: 12px; word-break: break-all; }
  .m-bar { height: 3px; border-radius: 2px; background: var(--s1); margin-top: 5px; min-width: 2px; }

  @media (max-width: 600px) {
    .chart-card { padding: 12px 10px 8px; }
    .models-card { padding: 12px 10px; }
    .legend { gap: 6px 16px; margin-bottom: 10px; }
    .tooltip { min-width: 150px; font-size: 11px; padding: 7px 10px; }
  }
  /* Touch devices: roomier legend/table hit areas. */
  @media (pointer: coarse) {
    .legend .item, .lg-device .dev { padding: 6px 8px; }
    th, td { padding: 10px 14px; }
  }
</style>
</head>
<body>
<header class="site-header" id="siteHeader" data-page="usage" data-sub="Token usage · daily"></header>
<div class="wrap">
  <div class="viewbar" id="viewbar"></div>
  <div id="chart"></div>
  <div id="models"></div>
</div>

<nav class="bottom-nav" id="bottomNav"></nav>
<script src="/nav.js"></script>

<script>
const $chart = document.getElementById("chart");
const $models = document.getElementById("models");
const DAYS_SHOWN = 30;
const HUES = 8; // categorical slots --s1..--s8, fixed order
// Series 9+ reuse a hue with a texture rather than taking a generated 9th
// colour — past ~8 hues nothing stays reliably distinguishable (especially
// under colourblindness), so identity moves onto a second channel. 8 hues x 4
// textures = 32 distinct series; beyond that the last texture repeats, which
// the legend and table still disambiguate by name.
const TEXTURES = ["solid", "stripe", "dot", "cross"];
const CHART_H = 300;
const PAD = { top: 12, right: 12, bottom: 24, left: 46 };
const HIDDEN_KEY = "turma-hidden-sessions";

// Toggle state persists across visits, keyed by "<host>::<sessionId>". Colors are
// assigned to sessions, not to visible positions, so toggling never repaints the
// remaining series.
let hidden = new Set(JSON.parse(localStorage.getItem(HIDDEN_KEY) || "[]"));
function saveHidden() { localStorage.setItem(HIDDEN_KEY, JSON.stringify([...hidden])); }

// View mode: "repos" (fleet-wide, unified across hosts) or "hosts". Persisted.
const MODE_KEY = "turma-usage-mode";
let mode = localStorage.getItem(MODE_KEY) === "hosts" ? "hosts" : "repos";
function setMode(m) {
  if (m === mode) return;
  mode = m;
  localStorage.setItem(MODE_KEY, m);
  renderViewbar();
  if (cache) render(cache);
}
function renderViewbar() {
  const bar = document.getElementById("viewbar");
  bar.replaceChildren();
  for (const [m, label] of [["repos", "By repo"], ["hosts", "By host"]]) {
    const b = document.createElement("button");
    b.textContent = label;
    if (mode === m) b.className = "active";
    b.addEventListener("click", () => setMode(m));
    bar.append(b);
  }
}

function fmtTokens(n) {
  if (!n) return "0";
  if (n >= 1e9) return (n / 1e9).toFixed(1) + "B";
  if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(1) + "k";
  return String(n);
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  })[c]);
}
const TOKEN_KEYS = ["input", "output", "cacheWrite", "cacheRead"];
function blankBucket() { return { input: 0, output: 0, cacheWrite: 0, cacheRead: 0 }; }
function dayTokens(d) { return d ? TOKEN_KEYS.reduce((n, k) => n + (d[k] || 0), 0) : 0; }
function sumDays(list) {
  const out = blankBucket();
  for (const d of list) if (d) for (const k of TOKEN_KEYS) out[k] += d[k] || 0;
  return out;
}

// --- usage merging (client-side, to unify a repo across hosts) --------------
// Each host reports per-repo and host-total usage aggregated from ALL its
// transcripts (independent of live sessions), so nothing here depends on a
// session still existing. "By repo" sums those per-repo blocks across hosts.
function blankUsage() {
  return { totals: blankBucket(), today: blankBucket(), week: blankBucket(), days: {}, models: new Map() };
}
function addBucket(dst, src) {
  if (!src) return;
  for (const k of TOKEN_KEYS) dst[k] += src[k] || 0;
}
function mergeUsageInto(acc, u) {
  if (!u) return;
  for (const w of ["totals", "today", "week"]) addBucket(acc[w], u[w]);
  for (const [d, b] of Object.entries(u.days || {})) {
    acc.days[d] = acc.days[d] || blankBucket();
    addBucket(acc.days[d], b);
  }
  // The same model usually runs in several repos/hosts, so its windows have to
  // merge by name rather than concatenate.
  for (const m of u.models || []) {
    let tgt = acc.models.get(m.model);
    if (!tgt) {
      tgt = { model: m.model, totals: blankBucket(), today: blankBucket(), week: blankBucket() };
      acc.models.set(m.model, tgt);
    }
    for (const w of ["totals", "today", "week"]) addBucket(tgt[w], m[w]);
  }
}

// "By repo": one series per repo, summed across every host it runs on. Repos are
// unified by the agent-supplied `remoteKey` (normalized git origin), so the same
// repo cloned on two hosts collapses to one series.
function repoSeries(agents) {
  const byKey = new Map(); // remoteKey -> merged series
  for (const a of agents) {
    for (const r of a.repoUsage || []) {
      const key = r.remoteKey || r.repo || "?";
      let g = byKey.get(key);
      if (!g) {
        g = { skey: "repo::" + key, group: "Repos", repo: r.repo || key,
              id: key, hosts: new Set(), usage: blankUsage() };
        byKey.set(key, g);
      }
      if (r.repo && r.repo !== "?") g.repo = r.repo;
      g.hosts.add(a.device || a.key);
      mergeUsageInto(g.usage, r.usage);
    }
  }
  return [...byKey.values()].map(g => {
    const hosts = [...g.hosts].sort();
    return {
      skey: g.skey, group: g.group, repo: g.repo, id: g.id,
      label: g.repo,
      device: hosts.join(", "),                 // shown as the muted host context
      rcName: g.repo + " · " + hosts.join(", "),
      usage: g.usage,
    };
  });
}

// "By host": one series per host, from its transcript-wide total (`usage`).
// Routed through mergeUsageInto (rather than passed straight through) so a host
// series carries the same normalized shape as a repo one — `models` a Map, the
// windows always present — and every reader below works on either.
function hostSeries(agents) {
  return agents.map(a => {
    const usage = blankUsage();
    // Prefer the host-level block (aggregated from every transcript on the
    // box). An older agent that reports none still sends per-repo blocks, so
    // fall back to those rather than dropping the host out of the view — the
    // dashboard tiles and the Android client fall back the same way.
    if (a.usage) mergeUsageInto(usage, a.usage);
    else for (const r of a.repoUsage || []) mergeUsageInto(usage, r.usage);
    return {
      skey: "host::" + a.key,
      group: "Hosts",
      repo: a.device || a.key,
      id: a.key,
      label: a.device || a.key,
      device: a.device || a.key,
      rcName: a.device || a.key,
      usage,
    };
  // A host that has consumed nothing at all isn't a series (this is the filter
  // the `a.usage` guard used to do implicitly).
  }).filter(s => dayTokens(s.usage.totals) > 0);
}

function toSeries(agents) {
  return mode === "hosts" ? hostSeries(agents) : repoSeries(agents);
}

function dateWindow(series) {
  const all = series.flatMap(s => Object.keys(s.usage?.days || {}));
  if (!all.length) return [];
  const end = new Date(all.sort().at(-1) + "T00:00:00Z");
  const out = [];
  for (let i = DAYS_SHOWN - 1; i >= 0; i--) {
    const d = new Date(end);
    d.setUTCDate(end.getUTCDate() - i);
    out.push(d.toISOString().slice(0, 10));
  }
  return out;
}
function niceMax(v) {
  if (v <= 0) return 1;
  const pow = Math.pow(10, Math.floor(Math.log10(v)));
  for (const m of [1, 2, 2.5, 5, 10]) if (v <= m * pow) return m * pow;
  return 10 * pow;
}
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function shortDate(iso) { return MONTHS[+iso.slice(5, 7) - 1] + " " + +iso.slice(8, 10); }

// Paint assigned by ordered position (stable across toggles — a filter must
// never repaint the series that survive it). EVERY series gets a paint: the
// first 8 the plain hues, then the same hues carrying a texture. Nothing falls
// through to a shared grey, so no two repos are indistinguishable.
function assignPaint(ordered) {
  const map = new Map();
  ordered.forEach((s, i) => map.set(s.skey, {
    hue: `var(--s${(i % HUES) + 1})`,
    texture: TEXTURES[Math.min(Math.floor(i / HUES), TEXTURES.length - 1)],
    id: i,
  }));
  return map;
}

// The SVG paint for a series: a plain hue, or a <pattern> reference for a
// textured one (defs are built once per render by textureDefs()).
function fillOf(paint) {
  return paint.texture === "solid" ? paint.hue : `url(#tex-${paint.id})`;
}

// One <pattern> per textured series, drawing the hue overlaid with surface-
// coloured geometry — the CSS .tx-* swatch rules mirror these; keep them in step.
function textureDefs(NS, paints) {
  const defs = document.createElementNS(NS, "defs");
  for (const paint of paints) {
    if (paint.texture === "solid") continue;
    const p = document.createElementNS(NS, "pattern");
    p.setAttribute("id", `tex-${paint.id}`);
    p.setAttribute("patternUnits", "userSpaceOnUse");
    const size = paint.texture === "dot" ? 5 : 6;
    p.setAttribute("width", size);
    p.setAttribute("height", size);
    // Rotate the whole tile rather than the geometry inside it — a diagonal
    // drawn within an axis-aligned tile wouldn't meet its neighbours' edges.
    if (paint.texture !== "dot") p.setAttribute("patternTransform", "rotate(45)");
    const bg = document.createElementNS(NS, "rect");
    bg.setAttribute("width", size);
    bg.setAttribute("height", size);
    bg.setAttribute("fill", paint.hue);
    p.append(bg);
    if (paint.texture === "dot") {
      const c = document.createElementNS(NS, "circle");
      c.setAttribute("cx", 2.5); c.setAttribute("cy", 2.5); c.setAttribute("r", 1.1);
      c.setAttribute("fill", "var(--surface)");
      p.append(c);
    } else {
      // stripe = one band across the rotated tile; cross = both axes of it.
      const lines = paint.texture === "cross"
        ? [[0, 0, 0, size], [0, 0, size, 0]]
        : [[0, 0, 0, size]];
      for (const [x1, y1, x2, y2] of lines) {
        const l = document.createElementNS(NS, "line");
        l.setAttribute("x1", x1); l.setAttribute("y1", y1);
        l.setAttribute("x2", x2); l.setAttribute("y2", y2);
        l.setAttribute("stroke", "var(--surface)");
        l.setAttribute("stroke-width", 2);
        p.append(l);
      }
    }
    defs.append(p);
  }
  return defs;
}

// The HTML (legend / tooltip) counterpart of fillOf. Sets background-COLOR, not
// the `background` shorthand: the shorthand also resets background-image to
// none, and an inline style beats the .tx-* rule, so the texture would silently
// never paint.
function paintSwatch(el, paint) {
  el.style.backgroundColor = paint.hue;
  if (paint.texture !== "solid") el.classList.add("tx-" + paint.texture);
}

function render(data) {
  const series = toSeries(data.agents || []);
  if (!series.length) {
    $chart.innerHTML = `<div class="empty">No usage reported yet (agents aggregate it within ~5 minutes of starting).</div>`;
    return;
  }

  // Stable order: by group, then label, then id — this is also the stacking and
  // color-assignment order.
  const byGroup = new Map();
  for (const s of [...series].sort((x, y) =>
    (x.group + "\x00" + x.label + "\x00" + x.id).localeCompare(y.group + "\x00" + y.label + "\x00" + y.id))) {
    if (!byGroup.has(s.group)) byGroup.set(s.group, []);
    byGroup.get(s.group).push(s);
  }
  const ordered = [...byGroup.values()].flat();
  const paintOf = assignPaint(ordered);
  const visible = ordered.filter(s => !hidden.has(s.skey));
  const dates = dateWindow(ordered);

  $chart.replaceChildren();
  $models.replaceChildren();
  if (!dates.length) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "No per-day usage reported yet (agents report it within ~5 minutes of starting).";
    $chart.append(empty);
    return;
  }

  const card = document.createElement("div");
  card.className = "chart-card";
  card.append(legendEl(byGroup, paintOf));
  buildChart(card, visible, dates, paintOf);
  $chart.append(card, tableView(visible, dates));
  $models.append(modelsCard(visible));
}

// Legend = filter. Series items toggle one series; the group name toggles all
// of that group's series at once.
function legendEl(byGroup, paintOf) {
  const legend = document.createElement("div");
  legend.className = "legend";
  for (const [groupName, list] of byGroup) {
    const group = document.createElement("span");
    group.className = "lg-device";
    const dev = document.createElement("span");
    dev.className = "dev";
    dev.textContent = groupName;
    dev.title = "Toggle all in " + groupName;
    dev.addEventListener("click", () => {
      const anyVisible = list.some(s => !hidden.has(s.skey));
      for (const s of list) anyVisible ? hidden.add(s.skey) : hidden.delete(s.skey);
      saveHidden();
      render(cache);
    });
    group.append(dev);
    for (const s of list) {
      const item = document.createElement("span");
      item.className = "item" + (hidden.has(s.skey) ? " off" : "");
      const sw = document.createElement("span");
      sw.className = "swatch";
      paintSwatch(sw, paintOf.get(s.skey));
      const label = document.createElement("span");
      label.className = "name";
      label.textContent = s.label;
      label.title = s.rcName || s.label;
      item.append(sw, label);
      item.addEventListener("click", () => {
        hidden.has(s.skey) ? hidden.delete(s.skey) : hidden.add(s.skey);
        saveHidden();
        render(cache);
      });
      group.append(item);
    }
    legend.append(group);
  }
  return legend;
}

function buildChart(card, list, dates, paintOf) {
  // Logical SVG width. On a phone, don't floor at a wide value — the SVG scales
  // to 100% of its container via viewBox, so a 520-wide floor would shrink all
  // text/bars on a ~360px screen. Draw close to the real width instead.
  const avail = document.body.clientWidth - 48;
  const width = Math.max(320, Math.min(1146, avail));
  const iw = width - PAD.left - PAD.right;
  const ih = CHART_H - PAD.top - PAD.bottom;
  // Scale to the visible series — the filter scopes everything below it.
  const yMax = niceMax(Math.max(0, ...dates.map(d =>
    dayTokens(sumDays(list.map(s => s.usage?.days?.[d])))
  )));
  const y = v => PAD.top + ih - (v / yMax) * ih;
  const band = iw / dates.length;
  const barW = Math.min(24, band * 0.7);
  const GAP = 2; // surface gap between stacked segments

  const NS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(NS, "svg");
  svg.setAttribute("viewBox", `0 0 ${width} ${CHART_H}`);
  svg.setAttribute("role", "img");
  svg.setAttribute("aria-label", "Daily tokens consumed, stacked by " + (mode === "hosts" ? "host" : "repo"));
  svg.append(textureDefs(NS, list.map(s => paintOf.get(s.skey))));

  const TICKS = 4;
  for (let i = 0; i <= TICKS; i++) {
    const v = (yMax / TICKS) * i;
    const gy = y(v);
    const line = document.createElementNS(NS, "line");
    line.setAttribute("class", i === 0 ? "baseline" : "gridline");
    line.setAttribute("x1", PAD.left); line.setAttribute("x2", width - PAD.right);
    line.setAttribute("y1", gy); line.setAttribute("y2", gy);
    svg.append(line);
    const t = document.createElementNS(NS, "text");
    t.setAttribute("x", PAD.left - 8);
    t.setAttribute("y", gy + 3.5);
    t.setAttribute("text-anchor", "end");
    t.textContent = fmtTokens(Math.round(v));
    svg.append(t);
  }

  const step = Math.ceil(dates.length / 8);
  dates.forEach((d, i) => {
    if (i % step !== 0 && i !== dates.length - 1) return;
    const t = document.createElementNS(NS, "text");
    t.setAttribute("x", PAD.left + band * i + band / 2);
    t.setAttribute("y", CHART_H - 7);
    t.setAttribute("text-anchor", "middle");
    t.textContent = shortDate(d);
    svg.append(t);
  });

  const tooltip = document.createElement("div");
  tooltip.className = "tooltip";

  dates.forEach((date, i) => {
    const g = document.createElementNS(NS, "g");
    g.setAttribute("class", "day-band");
    const x0 = PAD.left + band * i + (band - barW) / 2;
    const perSeries = list.map(s => ({ s, d: s.usage?.days?.[date] }));
    const stack = perSeries.filter(p => dayTokens(p.d) > 0);
    let cursor = y(0);
    stack.forEach((p, idx) => {
      const hPx = Math.max(1.5, (dayTokens(p.d) / yMax) * ih);
      const top = cursor - hPx;
      const isTop = idx === stack.length - 1;
      const r = Math.min(4, barW / 2, hPx);
      const seg = document.createElementNS(NS, "path");
      seg.setAttribute("class", "seg");
      seg.setAttribute("fill", fillOf(paintOf.get(p.s.skey)));
      seg.setAttribute("d", isTop
        ? `M${x0},${cursor} L${x0},${top + r} Q${x0},${top} ${x0 + r},${top} L${x0 + barW - r},${top} Q${x0 + barW},${top} ${x0 + barW},${top + r} L${x0 + barW},${cursor} Z`
        : `M${x0},${cursor} L${x0},${top} L${x0 + barW},${top} L${x0 + barW},${cursor} Z`);
      g.append(seg);
      cursor = top - GAP;
    });

    const hit = document.createElementNS(NS, "rect");
    hit.setAttribute("class", "day-hit");
    hit.setAttribute("x", PAD.left + band * i);
    hit.setAttribute("y", PAD.top);
    hit.setAttribute("width", band);
    hit.setAttribute("height", ih);
    hit.setAttribute("tabindex", "0");
    const show = () => {
      g.classList.add("hover");
      fillTooltip(tooltip, date, perSeries, paintOf);
      tooltip.style.display = "block";
      const cardBox = card.getBoundingClientRect();
      const svgBox = svg.getBoundingClientRect();
      const scale = svgBox.width / width;
      let left = svgBox.left - cardBox.left + (PAD.left + band * i + band / 2) * scale + 12;
      if (left + tooltip.offsetWidth > cardBox.width - 8) {
        left -= tooltip.offsetWidth + 24;
      }
      tooltip.style.left = left + "px";
      tooltip.style.top = (svgBox.top - cardBox.top + 18) + "px";
    };
    const hide = () => { g.classList.remove("hover"); tooltip.style.display = "none"; };
    hit.addEventListener("pointerenter", show);
    hit.addEventListener("pointerleave", hide);
    hit.addEventListener("focus", show);
    hit.addEventListener("blur", hide);
    g.append(hit);
    svg.append(g);
  });

  card.append(svg, tooltip);
}

// Tooltip: every visible series at that X (device in muted text after the
// name), total row last. Names inserted via textContent (untrusted data).
function fillTooltip(tooltip, date, perSeries, paintOf) {
  tooltip.replaceChildren();
  const dt = document.createElement("div");
  dt.className = "tt-date";
  dt.textContent = shortDate(date) + " (UTC)";
  tooltip.append(dt);
  const row = (paint, value, label, device) => {
    const el = document.createElement("div");
    el.className = "tt-row";
    const key = document.createElement("span");
    key.className = "tt-key";
    if (paint) paintSwatch(key, paint);
    const val = document.createElement("span");
    val.className = "tt-val";
    val.textContent = value;
    const name = document.createElement("span");
    name.className = "tt-name";
    name.textContent = label + " ";
    if (device) {
      const dev = document.createElement("span");
      dev.className = "tt-dev";
      dev.textContent = device;
      name.append(dev);
    }
    el.append(key, val, name);
    return el;
  };
  for (const { s, d } of perSeries) {
    const n = dayTokens(d);
    tooltip.append(row(paintOf.get(s.skey), n ? fmtTokens(n) : "–", s.label, s.device));
  }
  const total = row(null, fmtTokens(dayTokens(sumDays(perSeries.map(p => p.d)))), "Total");
  total.className = "tt-row tt-total";
  tooltip.append(total);
}

// Collapsible table — same slice as the chart (visible series only).
function tableView(list, dates) {
  const details = document.createElement("details");
  details.className = "table-view";
  const summary = document.createElement("summary");
  summary.textContent = "Table view";
  details.append(summary);

  if (!list.length) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "All series are toggled off.";
    details.append(empty);
    return details;
  }

  const shown = [...dates].reverse().filter(d =>
    list.some(s => s.usage?.days?.[d])
  );
  const head = list.map(s =>
    `<th>${esc(s.label)}<span class="sub">${esc(s.device || "")}</span></th>`
  ).join("");
  const rows = shown.map(date =>
    `<tr><td>${esc(date)}</td>${list.map(s => tokenCell(s.usage?.days?.[date])).join("")}${
      tokenCell(sumDays(list.map(s => s.usage?.days?.[date])), "total-col")}</tr>`
  ).join("");

  const scroll = document.createElement("div");
  scroll.className = "table-scroll";
  scroll.innerHTML = `<table>
    <thead><tr><th>Date</th>${head}<th class="total-col">Total</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td class="label">All-time</td>${
      list.map(s => tokenCell(s.usage?.totals)).join("")}${
      tokenCell(sumDays(list.map(s => s.usage?.totals)), "total-col")}</tr></tfoot>
  </table>`;
  details.append(scroll);
  return details;
}

// One token figure: the bucket's total, with the in/out split underneath —
// cache traffic dominates the total and would otherwise leave the headline
// number unreadable on its own.
function tokenCell(b, cls) {
  const klass = (extra) => ` class="${[cls, extra].filter(Boolean).join(" ")}"`;
  if (!dayTokens(b)) return `<td${klass("zero")}>–</td>`;
  return `<td${klass()}><span class="tok">${fmtTokens(dayTokens(b))}</span>` +
    `<span class="sub-tok">${fmtTokens(b.input)} in · ${fmtTokens(b.output)} out</span></td>`;
}

// "Tokens by model" — which model consumed what, merged across whichever series
// are currently visible, biggest first. The agent reports per-model windows but
// no per-model day series, so this is a table rather than another chart.
function modelsCard(list) {
  const card = document.createElement("div");
  card.className = "models-card";
  const h = document.createElement("h2");
  h.textContent = "Tokens by model";
  card.append(h);

  const merged = new Map();
  for (const s of list) {
    for (const m of (s.usage?.models || new Map()).values()) {
      let tgt = merged.get(m.model);
      if (!tgt) {
        tgt = { model: m.model, totals: blankBucket(), today: blankBucket(), week: blankBucket() };
        merged.set(m.model, tgt);
      }
      for (const w of ["totals", "today", "week"]) addBucket(tgt[w], m[w]);
    }
  }
  const models = [...merged.values()].sort((a, b) => dayTokens(b.totals) - dayTokens(a.totals));
  if (!models.length) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = list.length
      ? "No per-model usage reported yet (older agents don't break usage down by model)."
      : "All series are toggled off.";
    card.append(empty);
    return card;
  }

  const max = dayTokens(models[0].totals) || 1;
  const scroll = document.createElement("div");
  scroll.className = "table-scroll";
  scroll.innerHTML = `<table>
    <thead><tr><th>Model</th><th>Today</th><th>Last 7 days</th><th class="total-col">All-time</th></tr></thead>
    <tbody>${models.map(m => `<tr>
      <td>${esc(m.model)}<div class="m-bar" style="width:${
        Math.max(2, (dayTokens(m.totals) / max) * 100).toFixed(1)}%"></div></td>
      ${tokenCell(m.today)}${tokenCell(m.week)}${tokenCell(m.totals, "total-col")}
    </tr>`).join("")}</tbody>
  </table>`;
  card.append(scroll);
  return card;
}

let cache = null;
async function refresh() {
  try {
    const r = await fetch("/api/agents");
    if (r.status === 401) return void (location.href = "/login"); // session expired
    cache = await r.json();
  } catch { /* keep last render */ }
  if (cache) render(cache);
}
renderViewbar();

// ---- live push (FIX 1/#1): server-sent per-agent updates ---------------------
// The usage chart isn't latency-critical, so SSE updates patch `cache` and
// trigger a DEBOUNCED re-render (~1s) to avoid rebuilding the SVG on every
// heartbeat / flickering the tooltip. The 30s poll stays as a fallback, skipped
// while the stream is healthy.
let sseOk = false, sseBackoff = 2000, renderTimer = null;
function scheduleRender() {
  if (renderTimer) return;
  renderTimer = setTimeout(() => { renderTimer = null; if (cache) render(cache); }, 1000);
}
function applyAgent(rec) {
  if (!cache) cache = { now: Date.now(), agents: [] };
  const list = cache.agents || (cache.agents = []);
  const i = list.findIndex(a => a.key === rec.key);
  if (i >= 0) list[i] = rec; else list.push(rec);
  cache.now = Date.now();
}
function connectSSE() {
  let es;
  try { es = new EventSource("/api/events"); }
  catch { setTimeout(connectSSE, sseBackoff); return; }
  es.onopen = () => { sseOk = true; sseBackoff = 2000; };
  es.addEventListener("agent", (e) => {
    try { applyAgent(JSON.parse(e.data)); } catch { return; }
    scheduleRender();
  });
  es.addEventListener("removed", (e) => {
    try { const { key } = JSON.parse(e.data); if (cache) cache.agents = (cache.agents || []).filter(a => a.key !== key); }
    catch { return; }
    scheduleRender();
  });
  es.onerror = () => {
    sseOk = false;
    if (es.readyState === EventSource.CLOSED) {
      setTimeout(connectSSE, sseBackoff);
      sseBackoff = Math.min(sseBackoff * 2, 30000);
    }
  };
}

refresh();
connectSSE();
setInterval(() => { if (!sseOk) refresh(); }, 30000);
let resizeTimer;
addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => cache && render(cache), 200);
});
</script>
