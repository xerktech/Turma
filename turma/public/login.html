<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · Turma</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#f9f9f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)">
<link rel="stylesheet" href="/app.css">
<style>
  html, body { height: 100%; }
  body { display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card {
    width: 100%; max-width: 360px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 30px 28px 26px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 12px 34px rgba(0,0,0,0.06);
  }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .brand img { width: 40px; height: 40px; border-radius: 10px; display: block; flex: none; }
  .card h1 { font-size: 19px; }
  .sub { color: var(--muted); font-size: 13px; margin: 10px 0 22px; }

  form { display: flex; flex-direction: column; gap: 14px; }
  label { display: flex; flex-direction: column; gap: 6px; font-size: 12px; color: var(--ink-2); font-weight: 600; }
  input {
    background: var(--field); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px; width: 100%;
  }
  button.submit { margin-top: 4px; width: 100%; padding: 11px 12px; font-size: 14px; }

  .error {
    display: none; margin-top: 2px; font-size: 12.5px; color: var(--critical);
    background: color-mix(in srgb, var(--critical) 10%, transparent);
    border: 1px solid color-mix(in srgb, var(--critical) 28%, transparent);
    border-radius: var(--radius-sm); padding: 8px 10px;
  }
  .error.show { display: block; }

  .foot { margin-top: 20px; color: var(--muted); font-size: 11.5px; text-align: center; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="/favicon.svg" alt="" width="40" height="40">
      <h1>Turma</h1>
    </div>
    <p class="sub">Sign in to manage your agent fleet.</p>

    <div class="error" id="error"></div>

    <form id="form" autocomplete="on">
      <label>Username
        <input id="username" name="username" type="text" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" autofocus required>
      </label>
      <label>Password
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </label>
      <button id="submit" class="primary submit" type="submit">Sign in</button>
    </form>

    <div class="foot">Single-user access</div>
  </div>

<script>
  const form = document.getElementById("form");
  const errBox = document.getElementById("error");
  const submit = document.getElementById("submit");

  function showError(msg) {
    errBox.textContent = msg;
    errBox.classList.add("show");
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errBox.classList.remove("show");
    submit.disabled = true;
    submit.textContent = "Signing in…";
    try {
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.getElementById("username").value,
          password: document.getElementById("password").value,
        }),
      });
      if (res.ok) {
        // Land wherever the user was headed before the redirect, else the dashboard.
        const next = new URLSearchParams(location.search).get("next");
        location.replace(next && next.startsWith("/") ? next : "/");
        return;
      }
      showError(res.status === 401 ? "Incorrect username or password." : "Sign-in failed. Please try again.");
    } catch {
      showError("Network error. Please try again.");
    }
    submit.disabled = false;
    submit.textContent = "Sign in";
  });
</script>
</body>
</html>
